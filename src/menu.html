<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FB3E2C" />
  <title>Menú — Coraje Fast Food</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #FB3E2C;
      --cream:  #F2DDCD;
      --dark:   #111;
      --gray:   #f2f2f2;
      --muted:  #777;
    }

    html, body {
      font-family: 'Montserrat', Arial, sans-serif;
      background: var(--orange);
      min-height: 100%;
      -webkit-tap-highlight-color: transparent;
      scrollbar-width: none;
    }
    ::-webkit-scrollbar { display: none; }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 40;
      background: var(--orange);
      padding: 0.9rem 1.2rem 0;
      display: flex; align-items: center; justify-content: space-between;
      max-width: 780px; margin: 0 auto; width: 100%;
    }
    .back-btn {
      display: flex; align-items: center; gap: 0.35rem;
      color: rgba(255,255,255,0.9); font-size: 0.82rem; font-weight: 600;
      text-decoration: none; letter-spacing: 0.04em;
    }
    .header-logo img {
      height: 36px;
      width: auto;
      display: block;
      filter: brightness(0) saturate(100%) invert(93%) sepia(18%) saturate(300%) hue-rotate(330deg) brightness(105%);
    }

    /* ── WRAPPER ── */
    .wrapper {
      max-width: 780px;
      margin: 0 auto;
      width: 100%;
      padding: 0 1rem;
    }

    /* ── CATEGORY PILLS ── */
    .cat-scroll {
      display: flex; gap: 0.45rem;
      overflow-x: auto; padding: 0.9rem 1.2rem 0.7rem;
      scrollbar-width: none;
      max-width: 780px; margin: 0 auto;
    }
    .cat-scroll::-webkit-scrollbar { display: none; }
    .cat-pill {
      flex-shrink: 0; padding: 0.4rem 1.1rem;
      border-radius: 999px; font-size: 0.78rem;
      font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      border: 2px solid rgba(255,255,255,0.5);
      background: transparent; color: rgba(255,255,255,0.85);
      cursor: pointer; transition: all 0.15s ease; white-space: nowrap;
    }
    .cat-pill.active, .cat-pill:hover {
      background: #fff; border-color: #fff; color: var(--orange);
    }

    /* ── SECTION TITLE (agrupador en Todos) ── */
    .section-title {
      font-weight: 900; font-size: 1.5rem;
      color: #fff; text-transform: uppercase;
      letter-spacing: 0.03em;
      padding: 0.6rem 0 0.4rem;
      margin-top: 0.5rem;
    }
    .section-title:first-child { margin-top: 0; }

    /* ── CATEGORY TITLE ── */
    .cat-title {
      font-weight: 900; font-size: 2rem;
      color: #fff; letter-spacing: 0.02em; text-transform: uppercase;
      padding: 0.3rem 0 0.8rem;
    }

    /* ── LISTA ── */
    .product-list {
      display: flex; flex-direction: column; gap: 1rem;
      padding-bottom: 3rem;
    }

    /* ── TARJETA ── */
    .product-card {
      background: #fff;
      border-radius: 20px;
      display: flex; align-items: stretch;
      overflow: hidden; cursor: pointer;
      box-shadow: 0 2px 16px rgba(0,0,0,0.1);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      min-height: 130px;
    }
    .product-card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,0.15); }
    .product-card:active { transform: scale(0.984); box-shadow: 0 1px 8px rgba(0,0,0,0.1); }

    /* imagen */
    .product-img-wrap {
      flex-shrink: 0; width: 110px;
      background: var(--gray); position: relative; overflow: hidden;
    }
    .product-img-wrap img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform 0.3s ease;
    }
    .product-card:hover .product-img-wrap img { transform: scale(1.04); }
    .product-img-placeholder {
      width: 100%; height: 100%; min-height: 130px;
      background: #ede8e3;
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem;
    }

    /* info */
    .product-info {
      flex: 1; padding: 1rem 0.8rem 1rem 1.1rem;
      display: flex; flex-direction: column; justify-content: center; gap: 0.2rem;
    }
    .product-name {
      font-weight: 900; font-size: 1rem;
      color: var(--dark); line-height: 1.25; letter-spacing: -0.01em;
    }
    .product-desc {
      font-size: 0.75rem; color: var(--muted); line-height: 1.5; font-weight: 400;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
      margin-top: 0.1rem;
    }

    /* precios */
    .product-prices {
      flex-shrink: 0; display: flex; flex-direction: column;
      align-items: flex-end; justify-content: center;
      gap: 0.4rem; padding: 0.75rem 0.7rem 0.75rem 0.3rem;
      width: 90px;
    }
    .price-solo {
      display: flex; flex-direction: column; align-items: center;
      background: var(--orange); color: #fff;
      border-radius: 10px; padding: 0.35rem 0.5rem;
      font-weight: 800; font-size: 0.78rem; white-space: nowrap;
      width: 100%; text-align: center;
    }
    .price-solo .lbl {
      font-size: 0.5rem; font-weight: 800;
      letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.82;
      margin-bottom: 0.05rem;
    }
    .price-combo {
      display: flex; flex-direction: column; align-items: center;
      background: var(--gray); color: var(--dark);
      border-radius: 10px; padding: 0.35rem 0.5rem;
      font-weight: 800; font-size: 0.78rem; white-space: nowrap;
      width: 100%; text-align: center;
    }
    .price-combo .lbl {
      font-size: 0.5rem; font-weight: 800;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
      margin-bottom: 0.05rem;
    }
    .price-only {
      background: var(--orange); color: #fff;
      border-radius: 10px; padding: 0.45rem 0.5rem;
      font-weight: 800; font-size: 0.82rem; text-align: center;
      width: 100%;
    }

    /* ── MODAL ── */
    .modal-bg {
      position: fixed; inset: 0; z-index: 60;
      background: rgba(0,0,0,0.55);
      display: flex; align-items: flex-end; justify-content: center;
      padding: 0 0 0;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .modal-box {
      background: #fff;
      border-radius: 28px 28px 0 0;
      width: 100%; max-width: 540px;
      max-height: 92vh; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .modal-handle {
      width: 44px; height: 5px; background: #ddd;
      border-radius: 999px; margin: 1rem auto 0;
    }

    /* imagen grande del modal */
    .detail-img-wrap {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: #ede8e3;
      overflow: hidden;
      margin-top: 0.75rem;
    }
    .detail-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .detail-img-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 6rem;
    }

    /* texto del modal */
    .detail-body { padding: 1.25rem 1.4rem 2rem; }
    .detail-name {
      font-weight: 900; font-size: 1.55rem; color: var(--dark);
      line-height: 1.2; margin-bottom: 0.5rem;
    }
    .detail-desc {
      font-size: 0.9rem; color: #555; line-height: 1.6; margin-bottom: 1rem;
    }
    .detail-section-title {
      font-weight: 700; font-size: 0.68rem;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 0.4rem;
    }
    .detail-ingredients {
      font-size: 0.86rem; color: #444; line-height: 1.6;
      background: var(--gray); border-radius: 12px;
      padding: 0.85rem 1rem; margin-bottom: 1.25rem;
    }

    /* precios en modal */
    .detail-prices {
      display: flex; gap: 0.6rem; flex-wrap: wrap;
    }
    .detail-price-pill {
      display: flex; flex-direction: column; align-items: center;
      border-radius: 14px; padding: 0.75rem 1.2rem;
      flex: 1; min-width: 120px;
    }
    .detail-price-pill.solo { background: var(--orange); color: #fff; }
    .detail-price-pill.combo { background: var(--gray); color: var(--dark); }
    .detail-price-pill .pill-label {
      font-size: 0.62rem; font-weight: 800;
      letter-spacing: 0.14em; text-transform: uppercase;
      opacity: 0.75; margin-bottom: 0.2rem;
    }
    .detail-price-pill .pill-price {
      font-weight: 900; font-size: 1.2rem; line-height: 1;
    }
    .detail-price-pill .pill-sub {
      font-size: 0.65rem; opacity: 0.65; margin-top: 0.15rem;
    }

    /* botón cerrar */
    .close-btn {
      position: absolute; top: 1rem; right: 1rem;
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(0,0,0,0.08); border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1.1rem; color: #666;
    }
  </style>
</head>

<body x-data="menuApp()" x-init="init()">

  <!-- HEADER -->
  <div style="background:var(--orange); position:sticky; top:0; z-index:40;">
    <header>
      <a href="index.html" class="back-btn">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
        Inicio
      </a>
      <div class="header-logo">
        <img src="logo.png" alt="Coraje Fast Food" />
      </div>
      <div style="width:60px"></div>
    </header>

    <!-- CATEGORÍAS -->
    <div class="cat-scroll">
      <template x-for="cat in categories" :key="cat">
        <button class="cat-pill" :class="{ active: activeCategory === cat }"
          @click="activeCategory = cat" x-text="cat"></button>
      </template>
    </div>
  </div>

  <!-- CONTENIDO -->
  <div class="wrapper">
    <div class="cat-title" x-text="activeCategory === 'Todos' ? 'Menú' : activeCategory"></div>

    <!-- Títulos de sección -->
    <template x-for="cat in (activeCategory === 'Todos' ? categoryList : [])" :key="'sec-'+cat">
      <div>
        <div class="section-title" x-text="cat"></div>
        <div class="product-list" style="margin-bottom:0.5rem">
          <template x-for="item in items.filter(i => i.category === cat)" :key="item.id">
            <div class="product-card" @click="openDetail(item)">
              <div class="product-img-wrap">
                <template x-if="item.image"><img :src="item.image" :alt="item.name" loading="lazy" /></template>
                <template x-if="!item.image"><div class="product-img-placeholder" x-text="item.emoji||'🍽️'"></div></template>
              </div>
              <div class="product-info">
                <div class="product-name" x-text="item.name"></div>
                <div class="product-desc" x-text="item.ingredients||item.description"></div>
              </div>
              <div class="product-prices">
                <template x-if="item.priceCombo">
                  <div style="display:flex;flex-direction:column;gap:0.4rem;align-items:flex-end">
                    <div class="price-solo"><span class="lbl">Solo</span><span x-text="'$'+item.price.toLocaleString('es-CO')"></span></div>
                    <div class="price-combo"><span class="lbl">Combo</span><span x-text="'$'+item.priceCombo.toLocaleString('es-CO')"></span></div>
                  </div>
                </template>
                <template x-if="!item.priceCombo">
                  <div class="price-only" x-text="'$'+item.price.toLocaleString('es-CO')"></div>
                </template>
              </div>
            </div>
          </template>
        </div>
      </div>
    </template>

    <!-- Vista categoría individual -->
    <div class="product-list" x-show="activeCategory !== 'Todos'" style="scrollbar-width:none">
      <template x-for="item in filteredItems" :key="item.id">
        <div class="product-card" @click="openDetail(item)">
          <div class="product-img-wrap">
            <template x-if="item.image"><img :src="item.image" :alt="item.name" loading="lazy" /></template>
            <template x-if="!item.image"><div class="product-img-placeholder" x-text="item.emoji||'🍽️'"></div></template>
          </div>
          <div class="product-info">
            <div class="product-name" x-text="item.name"></div>
            <div class="product-desc" x-text="item.ingredients||item.description"></div>
          </div>
          <div class="product-prices">
            <template x-if="item.priceCombo">
              <div style="display:flex;flex-direction:column;gap:0.4rem;align-items:flex-end">
                <div class="price-solo"><span class="lbl">Solo</span><span x-text="'$'+item.price.toLocaleString('es-CO')"></span></div>
                <div class="price-combo"><span class="lbl">Combo</span><span x-text="'$'+item.priceCombo.toLocaleString('es-CO')"></span></div>
              </div>
            </template>
            <template x-if="!item.priceCombo">
              <div class="price-only" x-text="'$'+item.price.toLocaleString('es-CO')"></div>
            </template>
          </div>
        </div>
      </template>
    </div>
  </div>

  <!-- MODAL DETALLE -->
  <div class="modal-bg" x-show="selectedItem" @click.self="selectedItem = null"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 translate-y-4"
    x-transition:enter-end="opacity-100 translate-y-0"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    style="display:none">

    <div class="modal-box" style="position:relative" x-show="selectedItem"
      x-transition:enter="transition ease-out duration-250"
      x-transition:enter-start="opacity-0 transform translate-y-8"
      x-transition:enter-end="opacity-100 transform translate-y-0">

      <div class="modal-handle"></div>

      <button class="close-btn" @click="selectedItem = null">✕</button>

      <!-- Imagen grande -->
      <div class="detail-img-wrap">
        <template x-if="selectedItem?.image">
          <img :src="selectedItem.image" :alt="selectedItem.name" class="detail-img" />
        </template>
        <template x-if="!selectedItem?.image">
          <div class="detail-img-placeholder" x-text="selectedItem?.emoji || '🍽️'"></div>
        </template>
      </div>

      <div class="detail-body">
        <div class="detail-name" x-text="selectedItem?.name"></div>
        <div class="detail-desc" x-show="selectedItem?.description" x-text="selectedItem?.description"></div>

        <template x-if="selectedItem?.ingredients">
          <div>
            <div class="detail-section-title">Ingredientes</div>
            <div class="detail-ingredients" x-text="selectedItem.ingredients"></div>
          </div>
        </template>

        <!-- Precios -->
        <div class="detail-section-title">Precios</div>
        <div class="detail-prices">
          <div class="detail-price-pill solo">
            <span class="pill-label">Sola</span>
            <span class="pill-price" x-text="selectedItem ? '$' + selectedItem.price.toLocaleString('es-CO') : ''"></span>
          </div>
          <template x-if="selectedItem?.priceCombo">
            <div class="detail-price-pill combo">
              <span class="pill-label">Con Papas</span>
              <span class="pill-price" x-text="'$' + selectedItem.priceCombo.toLocaleString('es-CO')"></span>
              <span class="pill-sub">Papas y gaseosa</span>
            </div>
          </template>
        </div>
      </div>

    </div>
  </div>

  <script>
    function menuApp() {
      return {
        activeCategory: 'Todos',
        selectedItem: null,

        items: [
          { id: 1,  name: 'Chuzo desgranado de panceta', description: 'El favorito de la casa, con panceta caramelizada y nuestra salsa secreta.', ingredients: 'Panceta caramelizada, batavia, queso cuajada, ripio de papa, maicitos, salsa de la casa.', price: 29500, priceCombo: 37500, category: 'Chuzos', emoji: '🍢', image: '' },
          { id: 2,  name: 'Chuzo desgranado', description: 'Disponible en res, pollo o mixto. Lleno de sabor y textura.', ingredients: 'Res / Pollo / Mixto (res y pollo), batavia, queso cuajada, ripio de papa, maicitos, salsa de la casa.', price: 33900, priceCombo: 42900, category: 'Chuzos', emoji: '🍢', image: '' },
          { id: 3,  name: 'Hamburguesa Coraje', description: 'Nuestra clásica con carne 100% res y la salsa especial de la casa.', ingredients: 'Carne 100% res, pan brioche, lechuga, tomate, queso cheddar, cebolla morada, salsa de la casa.', price: 22000, priceCombo: 30000, category: 'Hamburguesas', emoji: '🍔', image: '' },
          { id: 4,  name: 'Hamburguesa BBQ', description: 'Para los amantes del ahumado con doble carne y tocino crujiente.', ingredients: 'Doble carne res, pan brioche, tocino crujiente, aros de cebolla, queso cheddar, salsa BBQ ahumada.', price: 26000, priceCombo: 34000, category: 'Hamburguesas', emoji: '🍔', image: '' },
          { id: 5,  name: 'Hamburguesa de Pollo', description: 'Pechuga apanada y crujiente con mayonesa de ajo y aguacate fresco.', ingredients: 'Pechuga de pollo apanada, pan brioche, mayonesa de ajo, aguacate, lechuga, tomate.', price: 24000, priceCombo: 32000, category: 'Hamburguesas', emoji: '🍔', image: '' },
          { id: 6,  name: 'Papas Fritas', description: 'Crujientes por fuera, suaves por dentro.', ingredients: 'Papa criolla frita, sal marina, aderezo a elección.', price: 9000, category: 'Papas', emoji: '🍟', image: '' },
          { id: 7,  name: 'Papas con Cheddar', description: 'Cargadas con queso cheddar fundido y tocineta crujiente.', ingredients: 'Papa frita, queso cheddar fundido, tocineta crujiente, cebollín.', price: 13000, category: 'Papas', emoji: '🍟', image: '' },
          { id: 8,  name: 'Gaseosa', description: 'Coca-Cola, Sprite o Manzana — 350ml bien fría.', ingredients: 'Bebida gaseosa 350ml a elección.', price: 4500, category: 'Bebidas', emoji: '🥤', image: '' },
          { id: 9,  name: 'Limonada Natural', description: 'Natural con hielo y menta fresca.', ingredients: 'Limón natural, agua, azúcar, hielo, menta fresca.', price: 6500, category: 'Bebidas', emoji: '🍋', image: '' },
          { id: 10, name: 'Agua', description: 'Agua mineral 500ml.', ingredients: 'Agua mineral sin gas 500ml.', price: 3000, category: 'Bebidas', emoji: '💧', image: '' },
          // ADICIONES
          { id: 11, name: 'Queso extra', description: 'Porción adicional de queso cheddar fundido.', ingredients: 'Queso cheddar fundido.', price: 2000, category: 'Adiciones', emoji: '🧀', image: '' },
          { id: 12, name: 'Tocineta extra', description: 'Tiras de tocineta crujiente adicionales.', ingredients: 'Tocineta crujiente.', price: 2500, category: 'Adiciones', emoji: '🥓', image: '' },
          { id: 13, name: 'Aguacate', description: 'Aguacate fresco en rodajas.', ingredients: 'Aguacate fresco.', price: 2000, category: 'Adiciones', emoji: '🥑', image: '' },
          { id: 14, name: 'Huevo', description: 'Huevo frito adicional.', ingredients: 'Huevo frito.', price: 1500, category: 'Adiciones', emoji: '🍳', image: '' },
        ],

        init() {},

        get categories() {
          return ['Todos', ...new Set(this.items.map(i => i.category))];
        },
        get categoryList() {
          return [...new Set(this.items.map(i => i.category))];
        },
        get filteredItems() {
          return this.activeCategory === 'Todos'
            ? this.items
            : this.items.filter(i => i.category === this.activeCategory);
        },
        get groupedItems() {
          if (this.activeCategory !== 'Todos') {
            return [{ category: this.activeCategory, items: this.filteredItems }];
          }
          const cats = [...new Set(this.items.map(i => i.category))];
          return cats.map(cat => ({
            category: cat,
            items: this.items.filter(i => i.category === cat)
          }));
        },
        get flatList() {
          const result = [];
          if (this.activeCategory === 'Todos') {
            const cats = [...new Set(this.items.map(i => i.category))];
            cats.forEach(cat => {
              result.push({ type: 'title', label: cat, _key: 'title-' + cat });
              this.items.filter(i => i.category === cat).forEach(item => {
                result.push({ ...item, type: 'item', _key: 'item-' + item.id });
              });
            });
          } else {
            this.items.filter(i => i.category === this.activeCategory).forEach(item => {
              result.push({ ...item, type: 'item', _key: 'item-' + item.id });
            });
          }
          return result;
        },
        openDetail(item) { this.selectedItem = item; },
      };
    }
  </script>

</body>
</html>
