<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menú — El Restaurante</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red:    #D42B24;
      --cream:  #F5EDD8;
      --dark:   #120902;
      --card:   #1e1008;
      --border: rgba(245,237,216,0.1);
      --muted:  rgba(245,237,216,0.45);
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      color: var(--cream);
      min-height: 100vh;
    }
    .bebas { font-family: 'Bebas Neue', sans-serif; }

    /* Header */
    header {
      position: sticky; top: 0; z-index: 40;
      background: rgba(18,9,2,0.92);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .back-btn {
      display: flex; align-items: center; gap: 0.35rem;
      color: var(--muted); font-size: 0.85rem;
      text-decoration: none; transition: color 0.2s;
    }
    .back-btn:hover { color: var(--cream); }
    .mesa-badge {
      background: var(--red);
      color: #fff;
      font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      padding: 0.22rem 0.7rem; border-radius: 999px;
    }

    /* Category pills */
    .cat-scroll {
      display: flex; gap: 0.5rem;
      overflow-x: auto; padding: 0.75rem 1rem;
      scrollbar-width: none;
    }
    .cat-scroll::-webkit-scrollbar { display: none; }
    .cat-pill {
      flex-shrink: 0;
      padding: 0.4rem 1rem;
      border-radius: 999px;
      font-size: 0.82rem; font-weight: 500;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      cursor: pointer; transition: all 0.2s;
      white-space: nowrap;
    }
    .cat-pill.active {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }

    /* Product grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
      padding: 0 1rem 6rem;
    }
    .product-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
    }
    .product-card:hover { transform: translateY(-3px); border-color: rgba(212,43,36,0.4); }
    .product-card img {
      width: 100%; aspect-ratio: 1;
      object-fit: cover;
      transition: transform 0.35s;
    }
    .product-card:hover img { transform: scale(1.05); }
    .product-info { padding: 0.65rem; }
    .product-name { font-weight: 600; font-size: 0.82rem; line-height: 1.25; margin-bottom: 0.2rem; }
    .product-desc { font-size: 0.72rem; color: var(--muted); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 0.5rem; }
    .product-footer { display: flex; align-items: center; justify-content: space-between; }
    .product-price { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; color: var(--cream); }
    .add-btn {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--red); color: #fff; border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1.2rem; line-height: 1;
      transition: transform 0.15s, filter 0.15s;
    }
    .add-btn:hover { transform: scale(1.12); filter: brightness(1.1); }

    /* Floating cart */
    .float-cart {
      position: fixed; bottom: 1.2rem; left: 50%; transform: translateX(-50%);
      z-index: 50;
      display: flex; align-items: center; gap: 0.75rem;
      background: var(--red); color: #fff;
      padding: 0.85rem 1.4rem;
      border-radius: 999px;
      font-weight: 600; font-size: 0.92rem;
      box-shadow: 0 8px 28px rgba(212,43,36,0.55);
      cursor: pointer; border: none;
      transition: transform 0.2s, filter 0.2s;
      white-space: nowrap;
    }
    .float-cart:hover { transform: translateX(-50%) translateY(-2px); filter: brightness(1.08); }
    .cart-count {
      background: rgba(255,255,255,0.25);
      border-radius: 999px;
      padding: 0.1rem 0.5rem;
      font-size: 0.8rem; font-weight: 700;
    }

    /* Modal backdrop */
    .modal-bg {
      position: fixed; inset: 0; z-index: 60;
      background: rgba(0,0,0,0.75);
      display: flex; align-items: flex-end; justify-content: center;
      padding: 0 0.75rem 0.75rem;
    }
    .modal-box {
      background: #1e1008;
      border: 1px solid var(--border);
      border-radius: 20px 20px 16px 16px;
      width: 100%; max-width: 420px;
      max-height: 88vh;
      overflow-y: auto;
      padding: 1.5rem;
    }
    .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 0.05em; margin-bottom: 1rem; }

    /* Cart items */
    .cart-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.65rem 0;
      border-bottom: 1px solid var(--border);
    }
    .cart-item-name { flex: 1; font-weight: 500; font-size: 0.88rem; }
    .qty-controls { display: flex; align-items: center; gap: 0.5rem; }
    .qty-btn {
      width: 26px; height: 26px; border-radius: 50%;
      border: 1px solid var(--border);
      background: transparent; color: var(--cream);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1rem;
      transition: background 0.15s;
    }
    .qty-btn:hover { background: var(--red); border-color: var(--red); }
    .qty-num { font-weight: 600; font-size: 0.9rem; min-width: 20px; text-align: center; }
    .cart-item-price { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; min-width: 60px; text-align: right; }

    /* Total */
    .cart-total {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 0 0.75rem;
      font-weight: 600;
    }
    .cart-total-amount { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; }

    /* Form fields */
    .field { margin-bottom: 0.75rem; }
    .field label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 0.3rem; letter-spacing: 0.08em; text-transform: uppercase; }
    .field input, .field textarea {
      width: 100%; background: rgba(245,237,216,0.05);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--cream); font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem; padding: 0.6rem 0.8rem;
      transition: border-color 0.2s;
    }
    .field input:focus, .field textarea:focus {
      outline: none; border-color: var(--red);
    }
    .field textarea { resize: none; height: 70px; }

    /* Confirm btn */
    .confirm-btn {
      width: 100%; padding: 1rem;
      background: var(--red); color: #fff;
      border: none; border-radius: 10px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem; letter-spacing: 0.1em;
      cursor: pointer; transition: filter 0.2s;
      margin-top: 0.5rem;
    }
    .confirm-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .confirm-btn:not(:disabled):hover { filter: brightness(1.1); }

    /* Success screen */
    .success-screen {
      position: fixed; inset: 0; z-index: 70;
      background: var(--dark);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem; text-align: center;
    }
    .success-icon { font-size: 4rem; margin-bottom: 1rem; }
    .success-title { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
    .success-sub { color: var(--muted); font-size: 0.92rem; margin-bottom: 2rem; }
    .order-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 4rem; color: var(--red);
      line-height: 1; margin-bottom: 0.25rem;
    }
    .new-order-btn {
      margin-top: 2rem; padding: 0.85rem 2rem;
      background: transparent; color: var(--cream);
      border: 1px solid var(--border); border-radius: 999px;
      font-size: 0.88rem; font-weight: 500; cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .new-order-btn:hover { border-color: var(--cream); }

    /* Product detail modal */
    .detail-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 12px; margin-bottom: 1rem; }
    .detail-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.7rem; letter-spacing: 0.04em; margin-bottom: 0.35rem; }
    .detail-desc { color: var(--muted); font-size: 0.88rem; line-height: 1.55; margin-bottom: 1rem; }
    .detail-footer { display: flex; align-items: center; justify-content: space-between; }
    .detail-price { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; }
    .detail-add {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.7rem 1.2rem;
      background: var(--red); color: #fff;
      border: none; border-radius: 8px;
      font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 0.08em;
      cursor: pointer;
    }
  </style>
</head>

<body x-data="menuApp()" x-init="init()">

  <!-- HEADER -->
  <header>
    <a href="index.html" class="back-btn">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
      Inicio
    </a>
    <h1 class="bebas" style="font-size:1.35rem;letter-spacing:0.06em">Menú</h1>
    <span class="mesa-badge" x-text="'Mesa ' + mesa"></span>
  </header>

  <!-- CATEGORÍAS -->
  <div class="cat-scroll">
    <template x-for="cat in categories" :key="cat">
      <button class="cat-pill" :class="{ active: activeCategory === cat }" @click="activeCategory = cat" x-text="cat"></button>
    </template>
  </div>

  <!-- GRID PRODUCTOS -->
  <div class="grid">
    <template x-for="item in filteredItems" :key="item.id">
      <div class="product-card" @click="openDetail(item)">
        <img :src="item.image" :alt="item.name" loading="lazy" />
        <div class="product-info">
          <div class="product-name" x-text="item.name"></div>
          <div class="product-desc" x-text="item.description"></div>
          <div class="product-footer">
            <span class="product-price" x-text="'$' + item.price.toLocaleString('es-CO')"></span>
            <button class="add-btn" @click.stop="addToCart(item)" aria-label="Agregar">+</button>
          </div>
        </div>
      </div>
    </template>
  </div>

  <!-- BOTÓN CARRITO FLOTANTE -->
  <button class="float-cart" x-show="cart.length > 0" @click="showCart = true" x-transition>
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
    </svg>
    Ver pedido
    <span class="cart-count" x-text="cartCount"></span>
  </button>

  <!-- MODAL DETALLE PRODUCTO -->
  <div class="modal-bg" x-show="selectedItem" @click.self="selectedItem = null" x-transition style="display:none">
    <div class="modal-box" x-show="selectedItem" x-transition>
      <img :src="selectedItem?.image" :alt="selectedItem?.name" class="detail-img" />
      <div class="detail-name" x-text="selectedItem?.name"></div>
      <div class="detail-desc" x-text="selectedItem?.description"></div>
      <div class="detail-footer">
        <span class="detail-price" x-text="selectedItem ? '$' + selectedItem.price.toLocaleString('es-CO') : ''"></span>
        <button class="detail-add" @click="addToCart(selectedItem); selectedItem = null">
          + Agregar
        </button>
      </div>
    </div>
  </div>

  <!-- MODAL CARRITO / CONFIRMAR PEDIDO -->
  <div class="modal-bg" x-show="showCart && !orderSuccess" @click.self="showCart = false" x-transition style="display:none">
    <div class="modal-box">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem">
        <h2 class="modal-title" style="margin-bottom:0">Tu Pedido</h2>
        <button @click="showCart = false" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.4rem">×</button>
      </div>

      <!-- Items del carrito -->
      <template x-for="(item, i) in cart" :key="item.id">
        <div class="cart-item">
          <span class="cart-item-name" x-text="item.name"></span>
          <div class="qty-controls">
            <button class="qty-btn" @click="decreaseQty(i)">−</button>
            <span class="qty-num" x-text="item.qty"></span>
            <button class="qty-btn" @click="item.qty++">+</button>
          </div>
          <span class="cart-item-price" x-text="'$' + (item.price * item.qty).toLocaleString('es-CO')"></span>
        </div>
      </template>

      <!-- Total -->
      <div class="cart-total">
        <span>Total</span>
        <span class="cart-total-amount" x-text="'$' + cartTotal.toLocaleString('es-CO')"></span>
      </div>

      <!-- Nombre, NIT y notas -->
      <div class="field">
        <label>Tu nombre (opcional)</label>
        <input type="text" x-model="customerName" placeholder="Ej: Carlos" maxlength="40" />
      </div>
      <div class="field">
        <label>NIT o Cédula — para factura (opcional)</label>
        <input type="text" x-model="customerNit" placeholder="Vacío = Consumidor Final" maxlength="20" inputmode="numeric" />
      </div>
      <div class="field">
        <label>Notas para la cocina (opcional)</label>
        <textarea x-model="orderNotes" placeholder="Ej: sin cebolla, bien cocido..."></textarea>
      </div>

      <button class="confirm-btn" @click="sendOrder()" :disabled="sending" x-text="sending ? 'Enviando...' : 'Confirmar Pedido'"></button>

      <p x-show="sendError" style="color:#f87171;font-size:0.8rem;margin-top:0.5rem;text-align:center" x-text="sendError"></p>
    </div>
  </div>

  <!-- PANTALLA DE ÉXITO -->
  <div class="success-screen" x-show="orderSuccess" x-transition style="display:none">
    <div class="success-icon">✅</div>
    <h2 class="success-title">¡Pedido enviado!</h2>
    <p class="success-sub">La cocina recibió tu pedido</p>
    <div style="color:var(--muted);font-size:0.8rem;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:0.25rem">Número de pedido</div>
    <div class="order-num" x-text="'#' + orderId"></div>
    <div style="color:var(--muted);font-size:0.82rem;margin-top:0.5rem">Mesa <span x-text="mesa" style="color:var(--cream);font-weight:600"></span></div>
    <button class="new-order-btn" @click="resetOrder()">Hacer otro pedido</button>
  </div>

  <script>
    function menuApp() {
      return {
        mesa: '?',
        activeCategory: 'Todos',
        selectedItem: null,
        showCart: false,
        cart: [],
        customerName: '',
        orderNotes: '',
        customerNit: '',
        sending: false,
        sendError: '',
        orderSuccess: false,
        orderId: null,

        items: [
          { id: 1, name: 'Hamburguesa Clásica', description: 'Carne 100% res, lechuga, tomate, queso cheddar y salsa especial de la casa.', price: 18000, category: 'Hamburguesas', image: 'https://placehold.co/400x400/D42B24/F5EDD8?text=🍔' },
          { id: 2, name: 'Hamburguesa BBQ', description: 'Doble carne, tocino crujiente, aros de cebolla y salsa BBQ ahumada.', price: 24000, category: 'Hamburguesas', image: 'https://placehold.co/400x400/8B1A1A/F5EDD8?text=BBQ' },
          { id: 3, name: 'Hamburguesa Pollo', description: 'Pechuga apanada, mayonesa de ajo, aguacate y ensalada fresca.', price: 20000, category: 'Hamburguesas', image: 'https://placehold.co/400x400/5C1010/F5EDD8?text=🐔' },
          { id: 4, name: 'Papas Fritas', description: 'Papas crujientes con sal marina y el aderezo que elijas.', price: 8000, category: 'Acompañamientos', image: 'https://placehold.co/400x400/C47A1E/F5EDD8?text=🍟' },
          { id: 5, name: 'Papas Rellenas', description: 'Papas cargadas con queso fundido, carne y tocineta.', price: 14000, category: 'Acompañamientos', image: 'https://placehold.co/400x400/9B5E10/F5EDD8?text=🥔' },
          { id: 6, name: 'Coca-Cola', description: 'Bebida gaseosa 350ml bien fría.', price: 4000, category: 'Bebidas', image: 'https://placehold.co/400x400/8B0000/F5EDD8?text=🥤' },
          { id: 7, name: 'Limonada Natural', description: 'Limonada natural con hielo y menta fresca.', price: 6000, category: 'Bebidas', image: 'https://placehold.co/400x400/4A7C00/F5EDD8?text=🍋' },
          { id: 8, name: 'Combo Clásico', description: 'Hamburguesa clásica + papas fritas + gaseosa a elección.', price: 28000, category: 'Combos', image: 'https://placehold.co/400x400/D42B24/F5EDD8?text=COMBO' },
        ],

        init() {
          const params = new URLSearchParams(window.location.search);
          this.mesa = params.get('mesa') || '1';
        },

        get categories() {
          return ['Todos', ...new Set(this.items.map(i => i.category))];
        },
        get filteredItems() {
          return this.activeCategory === 'Todos' ? this.items : this.items.filter(i => i.category === this.activeCategory);
        },
        get cartCount() {
          return this.cart.reduce((s, i) => s + i.qty, 0);
        },
        get cartTotal() {
          return this.cart.reduce((s, i) => s + i.price * i.qty, 0);
        },

        openDetail(item) { this.selectedItem = item; },

        addToCart(item) {
          const existing = this.cart.find(i => i.id === item.id);
          if (existing) existing.qty++;
          else this.cart.push({ ...item, qty: 1 });
        },

        decreaseQty(index) {
          if (this.cart[index].qty > 1) this.cart[index].qty--;
          else this.cart.splice(index, 1);
        },

        async sendOrder() {
          this.sending = true;
          this.sendError = '';
          try {
            const res = await fetch('/pedido', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                mesa: this.mesa,
                items: this.cart.map(i => ({ name: i.name, qty: i.qty, price: i.price })),
                nombre: this.customerName,
                notas:  this.orderNotes,
                nit:    this.customerNit,
              }),
            });
            const data = await res.json();
            if (data.success) {
              this.orderId = data.id;
              this.showCart = false;
              this.orderSuccess = true;
            } else {
              this.sendError = 'Error al enviar el pedido. Intenta de nuevo.';
            }
          } catch {
            this.sendError = 'Sin conexión al servidor. Avisa al mesero.';
          }
          this.sending = false;
        },

        resetOrder() {
          this.cart = [];
          this.customerName = '';
          this.customerNit = '';
          this.orderNotes = '';
          this.orderSuccess = false;
          this.orderId = null;
        },
      };
    }
  </script>

</body>
</html>
