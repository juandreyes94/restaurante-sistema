<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FB3E2C" />
  <title>Menú — Coraje Fast Food</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #FB3E2C;
      --cream:  #F2DDCD;
      --dark:   #111;
      --gray:   #f2f2f2;
      --muted:  #777;
    }

    html, body {
      font-family: 'Montserrat', Arial, sans-serif;
      background: var(--orange);
      min-height: 100%;
      -webkit-tap-highlight-color: transparent;
      scrollbar-width: none;
    }
    ::-webkit-scrollbar { display: none; }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 40;
      background: var(--orange);
      padding: 0.9rem 1.2rem 0;
      display: flex; align-items: center; justify-content: space-between;
      max-width: 780px; margin: 0 auto; width: 100%;
    }
    .back-btn {
      display: flex; align-items: center; gap: 0.35rem;
      color: rgba(255,255,255,0.9); font-size: 0.82rem; font-weight: 600;
      text-decoration: none; letter-spacing: 0.04em;
    }
    .header-logo img {
      height: 52px;
      width: auto;
      display: block;
      filter: brightness(0) saturate(100%) invert(93%) sepia(18%) saturate(300%) hue-rotate(330deg) brightness(105%);
    }

    /* ── WRAPPER ── */
    .wrapper {
      max-width: 780px;
      margin: 0 auto;
      width: 100%;
      padding: 0 1rem;
    }

    /* ── CATEGORY PILLS ── */
    .cat-scroll {
      overflow: hidden;
      padding: 0.9rem 0 0.7rem;
      max-width: 780px; margin: 0 auto;
    }
    .cat-track {
      display: flex; gap: 0.45rem;
      width: max-content;
      animation: cat-marquee 14s linear infinite;
      padding: 0 0.6rem;
    }
    .cat-track:hover { animation-play-state: paused; }
    @keyframes cat-marquee {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .cat-pill {
      flex-shrink: 0; padding: 0.4rem 1.1rem;
      border-radius: 999px; font-size: 0.78rem;
      font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      border: 2px solid rgba(255,255,255,0.5);
      background: transparent; color: rgba(255,255,255,0.85);
      cursor: pointer; transition: all 0.15s ease; white-space: nowrap;
    }
    .cat-pill.active, .cat-pill:hover {
      background: #fff; border-color: #fff; color: var(--orange);
    }

    /* ── SECTION TITLE (agrupador en Todos) ── */
    .section-title {
      font-weight: 900; font-size: 1.5rem;
      color: #fff; text-transform: uppercase;
      letter-spacing: 0.03em;
      padding: 0.6rem 0 0.4rem;
      margin-top: 0.5rem;
    }
    .section-title:first-child { margin-top: 0; }

    /* ── CATEGORY TITLE ── */
    .cat-title {
      font-weight: 900; font-size: 2rem;
      color: #fff; letter-spacing: 0.02em; text-transform: uppercase;
      padding: 0.3rem 0 0.8rem;
    }

    /* ── LISTA ── */
    .product-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.75rem;
      padding-bottom: 3rem;
    }
    @media (min-width: 540px) {
      .product-list { grid-template-columns: 1fr 1fr; }
    }

    /* ── TARJETA ── */
    .product-card {
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 3px 18px rgba(0,0,0,0.13);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      display: flex; flex-direction: column;
    }
    .product-card:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(0,0,0,0.18); }
    .product-card:active { transform: scale(0.97); }

    /* imagen full-width arriba */
    .product-img-wrap {
      width: 100%;
      aspect-ratio: 4/3;
      background: #1a1a1a;
      overflow: hidden;
      position: relative;
    }
    .product-img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      transition: transform 0.3s ease;
    }
    .product-card:hover .product-img-wrap img { transform: scale(1.06); }
    /* Tarjetas sin foto (Bebidas, Adiciones) */
    .product-card.no-img {
      flex-direction: row;
      align-items: center;
      grid-column: 1 / -1;
    }
    .no-img-emoji {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, #1c1c1c, #333);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      flex-shrink: 0;
      margin: 0.8rem 0 0.8rem 0.8rem;
    }
    .product-card.no-img .product-info {
      padding: 0.75rem 0.5rem 0.75rem 0.85rem;
    }
    .product-card.no-img .product-name {
      font-size: 0.88rem;
    }
    .product-card.no-img .product-prices {
      padding: 0.75rem 0.85rem 0.75rem 0.2rem;
      align-self: center;
    }

    /* info */
    .product-info {
      padding: 0.7rem 0.75rem 0.3rem;
      flex: 1;
    }
    .product-name {
      font-weight: 900; font-size: 0.82rem;
      color: var(--dark); line-height: 1.25; letter-spacing: -0.01em;
      margin-bottom: 0.2rem;
    }
    .product-desc {
      font-size: 0.68rem; color: var(--muted); line-height: 1.45; font-weight: 400;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }

    /* precios */
    .product-prices {
      display: flex; gap: 0.35rem; flex-wrap: wrap;
      padding: 0.5rem 0.75rem 0.75rem;
    }
    .price-solo {
      display: flex; flex-direction: column; align-items: center;
      background: var(--gray); color: var(--dark);
      border-radius: 8px; padding: 0.28rem 0.45rem;
      font-weight: 800; font-size: 0.72rem; white-space: nowrap;
    }
    .price-solo .lbl {
      font-size: 0.44rem; font-weight: 800;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
      margin-bottom: 0.02rem;
    }
    .price-combo {
      display: flex; flex-direction: column; align-items: center;
      background: var(--orange); color: #fff;
      border-radius: 8px; padding: 0.28rem 0.45rem;
      font-weight: 800; font-size: 0.72rem; white-space: nowrap;
    }
    .price-combo .lbl {
      font-size: 0.44rem; font-weight: 800;
      letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.82;
      margin-bottom: 0.02rem;
    }
    .price-only {
      background: var(--orange); color: #fff;
      border-radius: 8px; padding: 0.32rem 0.5rem;
      font-weight: 800; font-size: 0.75rem;
    }


    /* ── MODAL ── */
    .modal-bg {
      position: fixed; inset: 0; z-index: 60;
      background: rgba(0,0,0,0.55);
      display: flex; align-items: flex-end; justify-content: center;
      padding: 0 0 0;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .modal-box {
      background: #fff;
      border-radius: 28px 28px 0 0;
      width: 100%; max-width: 540px;
      max-height: 92vh; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .modal-handle {
      width: 44px; height: 5px; background: #ddd;
      border-radius: 999px; margin: 1rem auto 0;
    }

    /* imagen grande del modal — 4:3 paisaje */
    .detail-img-wrap {
      width: 100%;
      aspect-ratio: 4/3;
      margin-top: 0.75rem;
      overflow: hidden;
      background: #111;
    }
    .detail-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
    }
    .detail-img-placeholder {
      width: 100%; height: 200px;
      display: flex; align-items: center; justify-content: center;
      font-size: 6rem; background: #ede8e3;
    }

    /* texto del modal */
    .detail-body { padding: 1.25rem 1.4rem 2rem; }
    .detail-name {
      font-weight: 900; font-size: 1.55rem; color: var(--dark);
      line-height: 1.2; margin-bottom: 0.5rem;
    }
    .detail-desc {
      font-size: 0.9rem; color: #555; line-height: 1.6; margin-bottom: 1rem;
    }
    .detail-section-title {
      font-weight: 700; font-size: 0.68rem;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 0.4rem;
    }
    .detail-ingredients {
      font-size: 0.86rem; color: #444; line-height: 1.6;
      background: var(--gray); border-radius: 12px;
      padding: 0.85rem 1rem; margin-bottom: 1.25rem;
    }

    /* precios en modal */
    .detail-prices {
      display: flex; gap: 0.6rem; flex-wrap: wrap;
    }
    .detail-price-pill {
      display: flex; flex-direction: column; align-items: center;
      border-radius: 14px; padding: 0.75rem 1.2rem;
      flex: 1; min-width: 120px;
    }
    .detail-price-pill.solo { background: var(--gray); color: var(--dark); }
    .detail-price-pill.combo { background: var(--orange); color: #fff; }
    .detail-price-pill .pill-label {
      font-size: 0.62rem; font-weight: 800;
      letter-spacing: 0.14em; text-transform: uppercase;
      opacity: 0.75; margin-bottom: 0.2rem;
    }
    .detail-price-pill .pill-price {
      font-weight: 900; font-size: 1.2rem; line-height: 1;
    }
    .detail-price-pill .pill-sub {
      font-size: 0.65rem; opacity: 0.65; margin-top: 0.15rem;
    }

    /* botón cerrar */
    .close-btn {
      position: absolute; top: 1rem; right: 1rem;
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(0,0,0,0.08); border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1.1rem; color: #666;
    }
  </style>
</head>

<body x-data="menuApp()" x-init="init()">

  <!-- HEADER -->
  <div style="background:var(--orange); position:sticky; top:0; z-index:40;">
    <header>
      <a href="index.html" class="back-btn">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
        Inicio
      </a>
      <div class="header-logo">
        <img src="logo.png" alt="Coraje Fast Food" />
      </div>
      <div style="width:60px"></div>
    </header>

    <!-- CATEGORÍAS -->
    <div class="cat-scroll">
      <div class="cat-track">
        <template x-for="cat in categories" :key="'a-'+cat">
          <button class="cat-pill" :class="{ active: activeCategory === cat }"
            @click="activeCategory = cat" x-text="cat"></button>
        </template>
        <template x-for="cat in categories" :key="'b-'+cat">
          <button class="cat-pill" :class="{ active: activeCategory === cat }"
            @click="activeCategory = cat" x-text="cat"></button>
        </template>
      </div>
    </div>
  </div>

  <!-- CONTENIDO -->
  <div class="wrapper">
    <div class="cat-title" x-text="activeCategory === 'Todos' ? 'Menú' : activeCategory"></div>

    <!-- Títulos de sección -->
    <template x-for="cat in (activeCategory === 'Todos' ? categoryList : [])" :key="'sec-'+cat">
      <div>
        <div class="section-title" x-text="cat"></div>
        <div class="product-list" style="margin-bottom:0.5rem">
          <template x-for="item in items.filter(i => i.category === cat)" :key="item.id">
            <div class="product-card" :class="{ 'no-img': !item.image }" @click="openDetail(item)">
              <template x-if="item.image">
                <div class="product-img-wrap">
                  <img :src="item.image" :alt="item.name" loading="lazy" />
                </div>
              </template>
              <template x-if="!item.image">
                <div class="no-img-emoji" x-text="item.emoji||'🍽️'"></div>
              </template>
              <div class="product-info">
                <div class="product-name" x-text="item.name"></div>
                <div class="product-desc" x-text="item.description||item.ingredients"></div>
              </div>
              <div class="product-prices">
                <template x-if="item.priceCombo">
                  <div style="display:contents">
                    <div class="price-solo"><span class="lbl">Solo</span><span x-text="'$'+item.price.toLocaleString('es-CO')"></span></div>
                    <div class="price-combo"><span class="lbl">Combo</span><span x-text="'$'+item.priceCombo.toLocaleString('es-CO')"></span></div>
                  </div>
                </template>
                <template x-if="!item.priceCombo">
                  <div class="price-only" x-text="'$'+item.price.toLocaleString('es-CO')"></div>
                </template>
              </div>
            </div>
          </template>
        </div>
      </div>
    </template>

    <!-- Vista categoría individual -->
    <div class="product-list" x-show="activeCategory !== 'Todos'" style="scrollbar-width:none">
      <template x-for="item in filteredItems" :key="item.id">
        <div class="product-card" :class="{ 'no-img': !item.image }" @click="openDetail(item)">
          <template x-if="item.image">
            <div class="product-img-wrap">
              <img :src="item.image" :alt="item.name" loading="lazy" />
            </div>
          </template>
          <template x-if="!item.image">
            <div class="no-img-emoji" x-text="item.emoji||'🍽️'"></div>
          </template>
          <div class="product-info">
            <div class="product-name" x-text="item.name"></div>
            <div class="product-desc" x-text="item.description||item.ingredients"></div>
          </div>
          <div class="product-prices">
            <template x-if="item.priceCombo">
              <div style="display:contents">
                <div class="price-solo"><span class="lbl">Solo</span><span x-text="'$'+item.price.toLocaleString('es-CO')"></span></div>
                <div class="price-combo"><span class="lbl">Combo</span><span x-text="'$'+item.priceCombo.toLocaleString('es-CO')"></span></div>
              </div>
            </template>
            <template x-if="!item.priceCombo">
              <div class="price-only" x-text="'$'+item.price.toLocaleString('es-CO')"></div>
            </template>
          </div>
        </div>
      </template>
    </div>
  </div>


  <!-- MODAL DETALLE -->
  <div class="modal-bg" x-show="selectedItem" @click.self="selectedItem = null"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 translate-y-4"
    x-transition:enter-end="opacity-100 translate-y-0"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    style="display:none">

    <div class="modal-box" style="position:relative" x-show="selectedItem"
      x-transition:enter="transition ease-out duration-250"
      x-transition:enter-start="opacity-0 transform translate-y-8"
      x-transition:enter-end="opacity-100 transform translate-y-0">

      <div class="modal-handle"></div>

      <button class="close-btn" @click="selectedItem = null">✕</button>

      <!-- Imagen grande -->
      <div class="detail-img-wrap">
        <template x-if="selectedItem?.image">
          <img :src="selectedItem.image" :alt="selectedItem.name" class="detail-img" />
        </template>
        <template x-if="!selectedItem?.image">
          <div class="detail-img-placeholder" x-text="selectedItem?.emoji || '🍽️'"></div>
        </template>
      </div>

      <div class="detail-body">
        <div class="detail-name" x-text="selectedItem?.name"></div>
        <div class="detail-desc" x-show="selectedItem?.description" x-text="selectedItem?.description"></div>

        <template x-if="selectedItem?.ingredients">
          <div>
            <div class="detail-section-title">Ingredientes</div>
            <div class="detail-ingredients" x-text="selectedItem.ingredients"></div>
          </div>
        </template>

        <!-- Precios -->
        <div class="detail-section-title">Precios</div>
        <div class="detail-prices">
          <div class="detail-price-pill solo">
            <span class="pill-label">Sola</span>
            <span class="pill-price" x-text="selectedItem ? '$' + selectedItem.price.toLocaleString('es-CO') : ''"></span>
          </div>
          <template x-if="selectedItem?.priceCombo">
            <div class="detail-price-pill combo">
              <span class="pill-label">Con Papas</span>
              <span class="pill-price" x-text="'$' + selectedItem.priceCombo.toLocaleString('es-CO')"></span>
              <span class="pill-sub">Papas y gaseosa</span>
            </div>
          </template>
        </div>
      </div>

    </div>
  </div>

  <script>

      return {

        selectedItem: null,

        items: [

          { id:1,  name:'Chuzo Desgranado de Panceta',    description:'Panceta caramelizada, batavia, queso cuajada, ripio de papa, maicitos, salsa de la casa.',                                                                        price:32900, priceCombo:41900, category:'Chuzos',       image:'img/chuzo-desgranado-de-panceta.jpg' },

          { id:7,  name:'Hamburguesa Hawai',              description:'Pan brioche, 150 grs de carne premium, queso asado, piña calada, tocineta, vegetales, salsa BBQ, salsa de la casa.',                                               price:33900, priceCombo:42900, category:'Hamburguesas',  image:'img/hamburguesa-hawai.jpg' },

        async init() {
          // El menú lee del catálogo del panel (una sola fuente). Si falla, usa el listado local.
          try {
            const r = await fetch('/productos');
            if (r.ok) {
              const prods = await r.json();
              if (Array.isArray(prods) && prods.length) {
                this.items = prods
                  .filter(p => p.disponible !== false)
                  .map(p => ({
                    id: p.id, name: p.nombre, description: p.descripcion || '',
                    price: p.precio, priceCombo: p.precioCombo || undefined,
                    category: p.categoria, image: p.imagen || '', emoji: p.emoji || ''
                  }));
              }
            }
          } catch (e) { /* respaldo: listado local */ }
        },

        get categories() {
          return ['Todos', ...new Set(this.items.map(i => i.category))];
        },
        get categoryList() {
          return [...new Set(this.items.map(i => i.category))];
        },
        get filteredItems() {
          return this.activeCategory === 'Todos'
            ? this.items
            : this.items.filter(i => i.category === this.activeCategory);
        },
        get groupedItems() {
          if (this.activeCategory !== 'Todos') {
            return [{ category: this.activeCategory, items: this.filteredItems }];
          }
          const cats = [...new Set(this.items.map(i => i.category))];
          return cats.map(cat => ({
            category: cat,
            items: this.items.filter(i => i.category === cat)
          }));
        },
        get flatList() {
          const result = [];
          if (this.activeCategory === 'Todos') {
            const cats = [...new Set(this.items.map(i => i.category))];
            cats.forEach(cat => {
              result.push({ type: 'title', label: cat, _key: 'title-' + cat });
              this.items.filter(i => i.category === cat).forEach(item => {
                result.push({ ...item, type: 'item', _key: 'item-' + item.id });
              });
            });
          } else {
            this.items.filter(i => i.category === this.activeCategory).forEach(item => {
              result.push({ ...item, type: 'item', _key: 'item-' + item.id });
            });
          }
          return result;
        },
        openDetail(item) { this.selectedItem = item; },
      };
    }
