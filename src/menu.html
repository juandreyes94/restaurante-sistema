<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FB3E2C" />
  <title>Menú — Coraje Fast Food</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #FB3E2C;
      --cream:  #F2DDCD;
      --dark:   #111;
      --gray:   #f4f4f4;
      --muted:  #888;
    }

    html, body {
      font-family: 'Montserrat', Arial, sans-serif;
      background: var(--orange);
      min-height: 100%;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 40;
      background: var(--orange);
      padding: 0.9rem 1.1rem 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .back-btn {
      display: flex; align-items: center; gap: 0.3rem;
      color: rgba(255,255,255,0.85); font-size: 0.82rem; font-weight: 600;
      text-decoration: none; letter-spacing: 0.04em;
    }
    .back-btn svg { flex-shrink: 0; }
    .header-logo {
      font-weight: 900; font-size: 1.3rem;
      color: var(--cream); letter-spacing: 0.08em;
    }
    .mesa-badge { display: none; }

    /* ── CATEGORY PILLS ── */
    .cat-scroll {
      display: flex; gap: 0.45rem;
      overflow-x: auto; padding: 0.85rem 1.1rem 0.6rem;
      scrollbar-width: none;
    }
    .cat-scroll::-webkit-scrollbar { display: none; }
    .cat-pill {
      flex-shrink: 0;
      padding: 0.38rem 1rem;
      border-radius: 999px;
      font-size: 0.78rem; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      border: 2px solid rgba(255,255,255,0.5);
      background: transparent;
      color: rgba(255,255,255,0.8);
      cursor: pointer;
      transition: all 0.18s ease;
      white-space: nowrap;
    }
    .cat-pill.active, .cat-pill:hover {
      background: #fff;
      border-color: #fff;
      color: var(--orange);
    }

    /* ── CATEGORY TITLE ── */
    .cat-title {
      font-weight: 900; font-size: 1.7rem;
      color: #fff;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 0.5rem 0.9rem 0.4rem;
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── LISTA PRODUCTOS ── */
    .product-list {
      display: flex; flex-direction: column; gap: 0.75rem;
      padding: 0 0.9rem 7rem;
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── TARJETA ── */
    .product-card {
      background: #fff;
      border-radius: 18px;
      display: flex; align-items: stretch;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      box-shadow: 0 3px 16px rgba(0,0,0,0.13);
      min-height: 110px;
    }
    .product-card:active { transform: scale(0.983); box-shadow: 0 1px 6px rgba(0,0,0,0.1); }

    /* imagen */
    .product-img-wrap {
      flex-shrink: 0;
      width: 120px;
      position: relative;
      background: var(--gray);
    }
    .product-img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .product-img-placeholder {
      width: 100%; height: 100%; min-height: 110px;
      background: #f0ebe6;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.4rem;
    }

    /* info */
    .product-info {
      flex: 1;
      padding: 0.9rem 0.7rem 0.9rem 1rem;
      display: flex; flex-direction: column; justify-content: center;
      gap: 0.2rem;
    }
    .product-name {
      font-weight: 900; font-size: 0.95rem;
      color: var(--dark); line-height: 1.2;
      letter-spacing: -0.01em;
    }
    .product-desc {
      font-size: 0.71rem; color: var(--muted);
      line-height: 1.45; font-weight: 400;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }

    /* precios — columna derecha */
    .product-prices {
      flex-shrink: 0;
      display: flex; flex-direction: column;
      align-items: flex-end; justify-content: center;
      gap: 0.35rem;
      padding: 0.9rem 0.9rem 0.9rem 0.4rem;
    }
    .price-solo {
      display: flex; flex-direction: column; align-items: flex-end;
      background: var(--orange);
      color: #fff;
      border-radius: 10px;
      padding: 0.3rem 0.65rem;
      font-weight: 800; font-size: 0.85rem;
      white-space: nowrap; line-height: 1.2;
    }
    .price-solo span.label {
      font-size: 0.55rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      opacity: 0.8;
    }
    .price-combo {
      display: flex; flex-direction: column; align-items: flex-end;
      background: var(--gray);
      border-radius: 10px;
      padding: 0.28rem 0.6rem;
      font-weight: 800; font-size: 0.82rem;
      color: var(--dark);
      white-space: nowrap; line-height: 1.2;
    }
    .price-combo .combo-label {
      font-size: 0.55rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted);
    }
    /* sin combo */
    .price-only {
      background: var(--orange); color: #fff;
      border-radius: 10px;
      padding: 0.38rem 0.75rem;
      font-weight: 800; font-size: 0.88rem;
    }

    /* ── BOTÓN CARRITO FLOTANTE ── */
    .float-cart {
      position: fixed; bottom: 1.2rem; left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      display: flex; align-items: center; gap: 0.6rem;
      background: var(--dark); color: #fff;
      padding: 0.9rem 1.6rem;
      border-radius: 999px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700; font-size: 0.88rem;
      letter-spacing: 0.06em; text-transform: uppercase;
      box-shadow: 0 6px 28px rgba(0,0,0,0.3);
      cursor: pointer; border: none;
      white-space: nowrap;
      transition: transform 0.2s, filter 0.2s;
    }
    .float-cart:active { transform: translateX(-50%) scale(0.97); }
    .cart-count {
      background: var(--orange);
      border-radius: 999px;
      padding: 0.1rem 0.5rem;
      font-size: 0.78rem; font-weight: 800;
    }

    /* ── MODAL BACKDROP ── */
    .modal-bg {
      position: fixed; inset: 0; z-index: 60;
      background: rgba(0,0,0,0.6);
      display: flex; align-items: flex-end; justify-content: center;
      padding: 0 0.75rem 0.75rem;
      backdrop-filter: blur(4px);
    }
    .modal-box {
      background: #fff;
      border-radius: 24px 24px 16px 16px;
      width: 100%; max-width: 440px;
      max-height: 88vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 1.5rem;
    }
    .modal-title {
      font-weight: 900; font-size: 1.4rem;
      letter-spacing: 0.02em; color: var(--dark);
      margin-bottom: 1rem;
    }
    .modal-handle {
      width: 40px; height: 4px;
      background: #ddd; border-radius: 999px;
      margin: 0 auto 1rem;
    }

    /* detalle producto */
    .detail-img-wrap {
      margin: -1.5rem -1.5rem 1.1rem;
      border-radius: 24px 24px 0 0;
      overflow: hidden;
      aspect-ratio: 4/3;
      background: #f0ebe6;
    }
    .detail-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .detail-img-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 5rem;
    }
    .detail-name { font-weight: 900; font-size: 1.45rem; color: var(--dark); margin-bottom: 0.4rem; line-height: 1.2; }
    .detail-desc { color: #555; font-size: 0.88rem; line-height: 1.6; margin-bottom: 0.6rem; }
    .detail-ingredients-title {
      font-weight: 700; font-size: 0.7rem;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 0.35rem;
    }
    .detail-ingredients {
      color: #444; font-size: 0.83rem; line-height: 1.55;
      margin-bottom: 1rem;
      padding: 0.7rem 0.85rem;
      background: var(--gray);
      border-radius: 10px;
    }

    /* opciones solo/combo en detalle */
    .detail-options { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1rem; }
    .detail-option {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.85rem 1rem;
      border-radius: 12px; cursor: pointer;
      border: 2px solid #eee;
      transition: border-color 0.15s, background 0.15s;
    }
    .detail-option.selected {
      border-color: var(--orange);
      background: rgba(251,62,44,0.05);
    }
    .detail-option-label { font-weight: 700; font-size: 0.9rem; color: var(--dark); }
    .detail-option-sub { font-size: 0.72rem; color: var(--muted); }
    .detail-option-price { font-weight: 900; font-size: 1rem; color: var(--orange); }
    .detail-add {
      width: 100%; padding: 1rem;
      background: var(--orange); color: #fff;
      border: none; border-radius: 12px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 800; font-size: 0.95rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer; transition: filter 0.15s;
    }
    .detail-add:active { filter: brightness(0.92); }

    /* ── CARRITO ── */
    .cart-item {
      display: flex; align-items: center; gap: 0.65rem;
      padding: 0.7rem 0; border-bottom: 1px solid #f0f0f0;
    }
    .cart-item-name { flex: 1; font-weight: 600; font-size: 0.86rem; color: var(--dark); }
    .cart-item-sub { font-size: 0.7rem; color: var(--muted); }
    .qty-controls { display: flex; align-items: center; gap: 0.4rem; }
    .qty-btn {
      width: 28px; height: 28px; border-radius: 50%;
      border: 1.5px solid #ddd; background: transparent;
      color: var(--dark); display: flex; align-items: center;
      justify-content: center; cursor: pointer; font-size: 1rem;
      transition: background 0.15s, border-color 0.15s;
    }
    .qty-btn:active { background: var(--orange); border-color: var(--orange); color: #fff; }
    .qty-num { font-weight: 700; font-size: 0.9rem; min-width: 20px; text-align: center; color: var(--dark); }
    .cart-item-price { font-weight: 800; font-size: 0.9rem; color: var(--dark); min-width: 65px; text-align: right; }
    .cart-total {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 0 0.75rem; font-weight: 700;
      font-size: 0.9rem; color: var(--dark);
    }
    .cart-total-amount { font-weight: 900; font-size: 1.5rem; color: var(--orange); }

    /* campos */
    .field { margin-bottom: 0.7rem; }
    .field label {
      display: block; font-size: 0.72rem; font-weight: 700;
      color: var(--muted); margin-bottom: 0.3rem;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .field input, .field textarea {
      width: 100%; background: var(--gray);
      border: 1.5px solid transparent; border-radius: 10px;
      color: var(--dark); font-family: 'Montserrat', sans-serif;
      font-size: 0.88rem; padding: 0.65rem 0.85rem;
      transition: border-color 0.2s; outline: none;
    }
    .field input:focus, .field textarea:focus { border-color: var(--orange); }
    .field textarea { resize: none; height: 70px; }

    .confirm-btn {
      width: 100%; padding: 1rem;
      background: var(--orange); color: #fff;
      border: none; border-radius: 12px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 800; font-size: 0.95rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer; transition: filter 0.15s;
      margin-top: 0.5rem;
    }
    .confirm-btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .confirm-btn:not(:disabled):active { filter: brightness(0.92); }

    /* éxito */
    .success-screen {
      position: fixed; inset: 0; z-index: 70;
      background: var(--orange);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem; text-align: center;
    }
    .success-icon { font-size: 4rem; margin-bottom: 1rem; }
    .success-title { font-weight: 900; font-size: 2.2rem; color: #fff; letter-spacing: 0.04em; margin-bottom: 0.4rem; }
    .success-sub { color: rgba(255,255,255,0.75); font-size: 0.92rem; margin-bottom: 1.5rem; }
    .order-num { font-weight: 900; font-size: 4.5rem; color: var(--cream); line-height: 1; margin-bottom: 0.25rem; }
    .new-order-btn {
      margin-top: 2rem; padding: 0.85rem 2.2rem;
      background: var(--cream); color: var(--orange);
      border: none; border-radius: 999px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700; font-size: 0.88rem;
      letter-spacing: 0.06em; text-transform: uppercase;
      cursor: pointer;
    }
  </style>
</head>

<body x-data="menuApp()" x-init="init()">

  <!-- HEADER -->
  <header>
    <a href="index.html" class="back-btn">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
      Inicio
    </a>
    <span class="header-logo">CORAJE</span>
    <span class="mesa-badge" x-text="'Mesa ' + mesa"></span>
  </header>

  <!-- CATEGORÍAS -->
  <div class="cat-scroll">
    <template x-for="cat in categories" :key="cat">
      <button
        class="cat-pill"
        :class="{ active: activeCategory === cat }"
        @click="activeCategory = cat"
        x-text="cat"
      ></button>
    </template>
  </div>

  <!-- TÍTULO CATEGORÍA -->
  <div class="cat-title" x-text="activeCategory === 'Todos' ? 'Menú' : activeCategory"></div>

  <!-- LISTA DE PRODUCTOS -->
  <div class="product-list">
    <template x-for="item in filteredItems" :key="item.id">
      <div class="product-card" @click="openDetail(item)">

        <!-- Imagen -->
        <div class="product-img-wrap">
          <template x-if="item.image">
            <img :src="item.image" :alt="item.name" loading="lazy" />
          </template>
          <template x-if="!item.image">
            <div class="product-img-placeholder" x-text="item.emoji || '🍽️'"></div>
          </template>
        </div>

        <!-- Info -->
        <div class="product-info">
          <div class="product-name" x-text="item.name"></div>
          <div class="product-desc" x-text="item.description"></div>
        </div>

        <!-- Precios -->
        <div class="product-prices">
          <template x-if="item.priceCombo">
            <div>
              <div class="price-solo">
                <span class="label">Sola</span>
                <span x-text="'$' + item.price.toLocaleString('es-CO')"></span>
              </div>
            </div>
          </template>
          <template x-if="!item.priceCombo">
            <div class="price-only" x-text="'$' + item.price.toLocaleString('es-CO')"></div>
          </template>
          <template x-if="item.priceCombo">
            <div class="price-combo">
              <span class="combo-label">Con Papas</span>
              <span x-text="'$' + item.priceCombo.toLocaleString('es-CO')"></span>
            </div>
          </template>
        </div>

      </div>
    </template>
  </div>

  <!-- BOTÓN CARRITO FLOTANTE -->
  <button class="float-cart" x-show="cart.length > 0" @click="showCart = true" x-transition>
    <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
    </svg>
    Ver pedido
    <span class="cart-count" x-text="cartCount"></span>
  </button>

  <!-- MODAL DETALLE PRODUCTO -->
  <div class="modal-bg" x-show="selectedItem" @click.self="selectedItem = null" x-transition style="display:none">
    <div class="modal-box" x-show="selectedItem">
      <div class="modal-handle"></div>

      <div class="detail-img-wrap">
        <template x-if="selectedItem?.image">
          <img :src="selectedItem.image" :alt="selectedItem.name" class="detail-img" />
        </template>
        <template x-if="!selectedItem?.image">
          <div class="detail-img-placeholder" x-text="selectedItem?.emoji || '🍽️'"></div>
        </template>
      </div>

      <div class="detail-name" x-text="selectedItem?.name"></div>
      <div class="detail-desc" x-show="selectedItem?.description" x-text="selectedItem?.description"></div>

      <template x-if="selectedItem?.ingredients">
        <div>
          <div class="detail-ingredients-title">Ingredientes</div>
          <div class="detail-ingredients" x-text="selectedItem.ingredients"></div>
        </div>
      </template>

      <!-- Opciones solo / combo -->
      <div class="detail-options" x-show="selectedItem?.priceCombo">
        <div
          class="detail-option"
          :class="{ selected: selectedOption === 'solo' }"
          @click="selectedOption = 'solo'"
        >
          <div>
            <div class="detail-option-label">Solo</div>
          </div>
          <div class="detail-option-price" x-text="selectedItem ? '$' + selectedItem.price.toLocaleString('es-CO') : ''"></div>
        </div>
        <div
          class="detail-option"
          :class="{ selected: selectedOption === 'combo' }"
          @click="selectedOption = 'combo'"
        >
          <div>
            <div class="detail-option-label">Combo</div>
            <div class="detail-option-sub">Papas y gaseosa</div>
          </div>
          <div class="detail-option-price" x-text="selectedItem?.priceCombo ? '$' + selectedItem.priceCombo.toLocaleString('es-CO') : ''"></div>
        </div>
      </div>

      <button class="detail-add" @click="addToCartFromDetail()">
        + Agregar al pedido
      </button>
    </div>
  </div>

  <!-- MODAL CARRITO -->
  <div class="modal-bg" x-show="showCart && !orderSuccess" @click.self="showCart = false" x-transition style="display:none">
    <div class="modal-box">
      <div class="modal-handle"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem">
        <h2 class="modal-title" style="margin-bottom:0">Tu Pedido</h2>
        <button @click="showCart = false" style="background:none;border:none;cursor:pointer;font-size:1.5rem;color:#999;line-height:1">×</button>
      </div>

      <template x-for="(item, i) in cart" :key="item.cartId">
        <div class="cart-item">
          <div style="flex:1">
            <div class="cart-item-name" x-text="item.name"></div>
            <div class="cart-item-sub" x-text="item.option === 'combo' ? 'Combo (Papas y gaseosa)' : 'Solo'"></div>
          </div>
          <div class="qty-controls">
            <button class="qty-btn" @click="decreaseQty(i)">−</button>
            <span class="qty-num" x-text="item.qty"></span>
            <button class="qty-btn" @click="item.qty++">+</button>
          </div>
          <span class="cart-item-price" x-text="'$' + (item.unitPrice * item.qty).toLocaleString('es-CO')"></span>
        </div>
      </template>

      <div class="cart-total">
        <span>Total</span>
        <span class="cart-total-amount" x-text="'$' + cartTotal.toLocaleString('es-CO')"></span>
      </div>

      <div class="field">
        <label>Tu nombre (opcional)</label>
        <input type="text" x-model="customerName" placeholder="Ej: Carlos" maxlength="40" />
      </div>
      <div class="field">
        <label>NIT o Cédula — factura (opcional)</label>
        <input type="text" x-model="customerNit" placeholder="Vacío = Consumidor Final" maxlength="20" inputmode="numeric" />
      </div>
      <div class="field">
        <label>Notas para la cocina (opcional)</label>
        <textarea x-model="orderNotes" placeholder="Ej: sin cebolla, bien cocido..."></textarea>
      </div>

      <button class="confirm-btn" @click="sendOrder()" :disabled="sending" x-text="sending ? 'Enviando...' : 'Confirmar Pedido'"></button>
      <p x-show="sendError" style="color:var(--orange);font-size:0.8rem;margin-top:0.5rem;text-align:center" x-text="sendError"></p>
    </div>
  </div>

  <!-- PANTALLA ÉXITO -->
  <div class="success-screen" x-show="orderSuccess" x-transition style="display:none">
    <div class="success-icon">✅</div>
    <h2 class="success-title">¡Pedido enviado!</h2>
    <p class="success-sub">La cocina recibió tu pedido</p>
    <div style="color:rgba(255,255,255,0.6);font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:0.2rem">Número de pedido</div>
    <div class="order-num" x-text="'#' + orderId"></div>
    <div style="color:rgba(255,255,255,0.65);font-size:0.82rem;margin-top:0.4rem">Mesa <span x-text="mesa" style="color:#fff;font-weight:700"></span></div>
    <button class="new-order-btn" @click="resetOrder()">Hacer otro pedido</button>
  </div>

  <script>
    function menuApp() {
      return {
        mesa: '1',
        activeCategory: 'Todos',
        selectedItem: null,
        selectedOption: 'solo',
        showCart: false,
        cart: [],
        customerName: '',
        orderNotes: '',
        customerNit: '',
        sending: false,
        sendError: '',
        orderSuccess: false,
        orderId: null,
        cartIdCounter: 0,

        items: [
          // CHUZOS

        init() {
          const params = new URLSearchParams(window.location.search);
          this.mesa = params.get('mesa') || '1';
        },

        get categories() {
          return ['Todos', ...new Set(this.items.map(i => i.category))];
        },
        get filteredItems() {
          return this.activeCategory === 'Todos'
            ? this.items
            : this.items.filter(i => i.category === this.activeCategory);
        },
        get cartCount() { return this.cart.reduce((s, i) => s + i.qty, 0); },
        get cartTotal() { return this.cart.reduce((s, i) => s + i.unitPrice * i.qty, 0); },

        openDetail(item) {
          this.selectedItem = item;
          this.selectedOption = 'solo';
        },

        addToCartFromDetail() {
          const item = this.selectedItem;
          const isCombo = this.selectedOption === 'combo' && item.priceCombo;
          const unitPrice = isCombo ? item.priceCombo : item.price;
          const cartId = ++this.cartIdCounter;
          this.cart.push({
            cartId,
            id: item.id,
            name: item.name,
            option: isCombo ? 'combo' : 'solo',
            unitPrice,
            qty: 1,
            price: unitPrice,
          });
          this.selectedItem = null;
        },

        decreaseQty(index) {
          if (this.cart[index].qty > 1) this.cart[index].qty--;
          else this.cart.splice(index, 1);
        },

        async sendOrder() {
          this.sending = true;
          this.sendError = '';
          try {
            const res = await fetch('/pedido', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                mesa: this.mesa,
                items: this.cart.map(i => ({
                  name: i.name + (i.option === 'combo' ? ' (Combo)' : ''),
                  qty: i.qty,
                  price: i.unitPrice
                })),
                nombre: this.customerName,
                notas:  this.orderNotes,
                nit:    this.customerNit,
              }),
            });
            const data = await res.json();
            if (data.success) {
              this.orderId = data.id;
              this.showCart = false;
              this.orderSuccess = true;
            } else {
              this.sendError = 'Error al enviar el pedido. Intenta de nuevo.';
            }
          } catch {
            this.sendError = 'Sin conexión al servidor. Avisa al mesero.';
          }
          this.sending = false;
        },

        resetOrder() {
          this.cart = [];
          this.customerName = '';
          this.customerNit = '';
          this.orderNotes = '';
          this.orderSuccess = false;
          this.orderId = null;
        },
      };
    }
  </script>
