<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comandas — Cocina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red:    #D42B24;
      --cream:  #F5EDD8;
      --dark:   #0e0804;
      --card:   #1a0e06;
      --border: rgba(245,237,216,0.1);
      --muted:  rgba(245,237,216,0.4);
      --green:  #22c55e;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      color: var(--cream);
      min-height: 100vh;
    }
    .bebas { font-family: 'Bebas Neue', sans-serif; }

    /* Header */
    header {
      background: rgba(14,8,4,0.95);
      border-bottom: 2px solid var(--red);
      padding: 0.85rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 30;
    }
    .header-left { display: flex; align-items: center; gap: 0.75rem; }
    .logo-text { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 0.08em; }
    .status-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: #ccc;
      transition: background 0.3s;
    }
    .status-dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .status-dot.error { background: var(--red); }
    .status-label { font-size: 0.75rem; color: var(--muted); }

    .pending-count {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem; letter-spacing: 0.05em;
    }
    .pending-count span { color: var(--red); }

    /* Empty state */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 60vh; color: var(--muted); text-align: center; gap: 0.75rem;
    }
    .empty-state .icon { font-size: 3.5rem; }
    .empty-state p { font-size: 1.1rem; }

    /* Orders grid */
    .orders-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
      padding: 1.25rem;
    }

    /* Comanda card */
    .comanda-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      animation: slideIn 0.4s ease both;
      transition: border-color 0.2s;
    }
    .comanda-card.new-order {
      border-color: var(--red);
      animation: slideIn 0.4s ease both, pulse-border 1s ease 3;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes pulse-border {
      0%, 100% { border-color: var(--red); }
      50%       { border-color: rgba(212,43,36,0.3); }
    }

    .card-header {
      background: var(--red);
      padding: 0.65rem 1rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .mesa-label { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 0.06em; }
    .order-meta { text-align: right; }
    .order-id { font-size: 0.75rem; opacity: 0.8; }
    .order-time { font-size: 0.8rem; font-weight: 600; }

    .card-body { padding: 1rem; }

    /* Items list */
    .item-row {
      display: flex; align-items: baseline; gap: 0.5rem;
      padding: 0.35rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .item-row:last-child { border-bottom: none; }
    .item-qty {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.15rem;
      color: var(--red); min-width: 24px;
    }
    .item-name { flex: 1; font-weight: 500; }

    /* Cliente y notas */
    .card-meta {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
      font-size: 0.8rem; color: var(--muted);
      display: flex; flex-direction: column; gap: 0.25rem;
    }
    .card-meta strong { color: var(--cream); }

    /* Completar btn */
    .btn-row { display: flex; gap: 0.5rem; margin-top: 1rem; }
    .complete-btn {
      flex: 1;
      padding: 0.75rem;
      background: transparent;
      border: 1.5px solid var(--green);
      color: var(--green);
      border-radius: 8px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem; letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .complete-btn:hover { background: var(--green); color: #000; }

    /* Facturar btn */
    .invoice-btn {
      flex: 0 0 auto;
      padding: 0.75rem 0.9rem;
      background: transparent;
      border: 1.5px solid #f59e0b;
      color: #f59e0b;
      border-radius: 8px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem; letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .invoice-btn:hover { background: #f59e0b; color: #000; }
    .invoice-btn.done { border-color: var(--green); color: var(--green); cursor: default; }
    .invoice-form {
      display: none; gap: 0.4rem; margin-top: 0.5rem;
    }
    .invoice-form input {
      flex: 1; min-width: 0;
      background: rgba(245,237,216,0.05);
      border: 1px solid rgba(245,237,216,0.15);
      border-radius: 6px;
      color: var(--cream); font-size: 0.8rem;
      padding: 0.5rem 0.65rem;
    }
    .invoice-submit {
      padding: 0.5rem 0.85rem;
      background: var(--red); color: #fff;
      border: none; border-radius: 6px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.9rem; letter-spacing: 0.08em;
      cursor: pointer; white-space: nowrap;
    }
    .comanda-card.invoiced .card-header { background: #1a5c32; }

    /* Toast notification */
    .toast {
      position: fixed; top: 5rem; right: 1rem; z-index: 99;
      background: var(--red); color: #fff;
      padding: 0.75rem 1.25rem;
      border-radius: 10px;
      font-weight: 600; font-size: 0.9rem;
      box-shadow: 0 8px 24px rgba(212,43,36,0.5);
      animation: toastIn 0.3s ease both;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* Reconnect overlay */
    .reconnect-overlay {
      position: fixed; inset: 0; z-index: 80;
      background: rgba(14,8,4,0.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1rem;
      text-align: center;
    }
    .reconnect-overlay p { color: var(--muted); font-size: 0.9rem; }
    .spinner {
      width: 40px; height: 40px; border-radius: 50%;
      border: 3px solid var(--border);
      border-top-color: var(--red);
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <div style="display:flex;flex-direction:column;gap:0.2rem">
        <span class="logo-text">🍽️ Comandas</span>
        <div style="display:flex;align-items:center;gap:0.4rem">
          <div class="status-dot" id="statusDot"></div>
          <span class="status-label" id="statusLabel">Conectando...</span>
        </div>
      </div>
    </div>
    <div style="text-align:right">
      <div class="pending-count">Pendientes: <span id="pendingCount">0</span></div>
      <button onclick="clearCompleted()" style="font-size:0.72rem;color:var(--muted);background:none;border:none;cursor:pointer;margin-top:0.2rem">Limpiar completados</button>
    </div>
  </header>

  <!-- ORDERS -->
  <div class="orders-grid" id="ordersGrid">
    <div class="empty-state" id="emptyState">
      <span class="icon">⏳</span>
      <p>Esperando pedidos...</p>
      <p style="font-size:0.82rem">Los pedidos de los clientes aparecerán aquí</p>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toastContainer"></div>

  <!-- Reconectar overlay -->
  <div class="reconnect-overlay" id="reconnectOverlay" style="display:none">
    <div class="spinner"></div>
    <p style="color:var(--cream);font-weight:600;font-size:1rem">Sin conexión con el servidor</p>
    <p>Reconectando automáticamente...</p>
  </div>

  <!-- Sonido de notificación (beep) -->
  <audio id="bellSound" preload="auto">
    <source src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2tOPFF8r+nVkWE6PluCpbuUXjUnPmOYy+7Yk1A1OGCVv9jOklI4OVp/qbqJUi0jN1qOvNXNiU82PlZ8pbqAUCsiNVaKuNLIiEwzO1V3obd+TSkgMlSHuNDFhUkwOVR1n7V8TSchMFKEts/ChEYuNlJxnLN5SiYeMFCDs87AgEMsNFFvmbF2SCQcLk5/scj9hMszNUtnlq11RiIaLE18r8r8g8kxM0plk6tzRSAdKkl6rsn8gsYwMkhinrF3TCkfK0h5rMf7gcQvMUVgl61xTCggK0R1qcT6f8MuLkJdlKpvSR4cKkFypsL5f8AtLEBbkqdtRxwZKD9vosD4fb8rKz9ZkKVrRhsXJz1tnb73e70qKD1XjqNpRRoWJTtqm736e7spJztUi6BnRBkVJDhom7v6erkpJjhSiZ5lQxgUJDZlmLn5eHUoJDZQh5xkQhcTIjNimbj4d3MoIjNNhZpiQRYSITFhlrb3dXEoIDFLg5hgQBUSIDBelaH0c28nHi9JgJZfPxQRHy1clZn0cm0nHS5HfpVePxMQHipalJf0cWsnHC1FfJNdPhMQHS5Xk5T1cGsmGy1De5JcPhIPHS1WkZP1b2omGitCeZBbPREOHCtUkJL2bmkmGSlAd49aPRANGypSkJD2bWgmGCg+do5ZPRAMGilRj472bGcmFyc8dI1YPQ8LGShQjo32a2YmFiY7co1XPQ8LGCdPjYz2amYmFiU6cIxWPA4KFyZOjIv3aWUmFSQ5boxVPA4KFiVNi4v3aGUmFCQ4bYtUPQ0JFiVMiop3Z2QlFCM3bIpTPQ0JFSRMiIl3ZmQlEyM2a4lSPA0IFCNLiIl3ZWQlEyI1aohRPA0IFCNLh4h3ZGQkEiI1aocQPA0IFCJKhod3Y2MkEiE0aYcPPA4IFCJKhod3Y2MkEiE0aIYQPA4IFCFJhYd3YmMkEiA0aIYQPA4IFCFIhYd3YmMkEiA0aIYQPA4IFCFIhYd3YmMkEiA0aIYQ" type="audio/wav" />
  </audio>

  <script>
    const orders = {};
    let ws;
    let reconnectTimer;

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}`);

      ws.onopen = () => {
        setStatus('connected', 'En línea');
        document.getElementById('reconnectOverlay').style.display = 'none';
        clearTimeout(reconnectTimer);
      };

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'init') {
          msg.orders.forEach(o => addOrder(o, false));
          updateCount();
        } else if (msg.type === 'new_order') {
          addOrder(msg.order, true);
          playBell();
          showToast(`🔔 Nuevo pedido — Mesa ${msg.order.mesa}`);
          updateCount();
        } else if (msg.type === 'order_complete') {
          removeOrder(msg.id);
          updateCount();
        }
      };

      ws.onclose = () => {
        setStatus('error', 'Sin conexión');
        document.getElementById('reconnectOverlay').style.display = 'flex';
        reconnectTimer = setTimeout(connect, 3000);
      };

      ws.onerror = () => ws.close();
    }

    function setStatus(type, label) {
      const dot = document.getElementById('statusDot');
      dot.className = 'status-dot ' + type;
      document.getElementById('statusLabel').textContent = label;
    }

    function formatTime(ts) {
      const now = Date.now();
      const diff = Math.floor((now - ts) / 1000);
      if (diff < 60) return `Hace ${diff}s`;
      return `Hace ${Math.floor(diff / 60)}min`;
    }

    function addOrder(order, isNew) {
      orders[order.id] = order;
      const grid = document.getElementById('ordersGrid');
      const empty = document.getElementById('emptyState');
      if (empty) empty.remove();

      const card = document.createElement('div');
      card.className = 'comanda-card' + (isNew ? ' new-order' : '');
      card.id = 'order-' + order.id;

      const itemsHTML = order.items.map(i =>
        `<div class="item-row">
          <span class="item-qty">${i.qty}×</span>
          <span class="item-name">${i.name}</span>
        </div>`
      ).join('');

      const metaHTML = (order.nombre || order.notas) ? `
        <div class="card-meta">
          ${order.nombre ? `<span>👤 <strong>${order.nombre}</strong></span>` : ''}
          ${order.notas  ? `<span>📝 ${order.notas}</span>` : ''}
        </div>` : '';

      card.innerHTML = `
        <div class="card-header">
          <span class="mesa-label">Mesa ${order.mesa}</span>
          <div class="order-meta">
            <div class="order-id">#${order.id}</div>
            <div class="order-time">${formatTime(order.timestamp)}</div>
          </div>
        </div>
        <div class="card-body">
          <div class="items-list">${itemsHTML}</div>
          ${metaHTML}
          <div class="btn-row">
            <button class="complete-btn" onclick="completeOrder(${order.id})">✓ Completado</button>
            <button class="invoice-btn" id="inv-btn-${order.id}" onclick="toggleInvoice(${order.id})">🧾</button>
          </div>
          <div class="invoice-form" id="inv-form-${order.id}">
            <input type="text" id="inv-nit-${order.id}" placeholder="NIT/CC (vacío = consumidor final)" value="${order.nit || ''}" />
            <button class="invoice-submit" onclick="facturarOrder(${order.id})">Emitir</button>
          </div>
        </div>`;

      grid.prepend(card);

      // Actualizar tiempos cada 30s
      setInterval(() => {
        const timeEl = card.querySelector('.order-time');
        if (timeEl) timeEl.textContent = formatTime(order.timestamp);
      }, 30000);
    }

    function removeOrder(id) {
      const card = document.getElementById('order-' + id);
      if (card) {
        card.style.transition = 'opacity 0.4s, transform 0.4s';
        card.style.opacity = '0';
        card.style.transform = 'scale(0.9)';
        setTimeout(() => {
          card.remove();
          delete orders[id];
          if (Object.keys(orders).length === 0) showEmpty();
        }, 400);
      }
    }

    function showEmpty() {
      const grid = document.getElementById('ordersGrid');
      if (!document.getElementById('emptyState')) {
        const div = document.createElement('div');
        div.id = 'emptyState';
        div.className = 'empty-state';
        div.innerHTML = '<span class="icon">✅</span><p>Todo al día</p><p style="font-size:0.82rem">Sin pedidos pendientes</p>';
        grid.appendChild(div);
      }
    }

    function updateCount() {
      document.getElementById('pendingCount').textContent = Object.keys(orders).length;
    }

    async function completeOrder(id) {
      try {
        await fetch(`/pedido/${id}/completar`, { method: 'POST' });
        removeOrder(id);
        updateCount();
      } catch {
        alert('Error al completar el pedido');
      }
    }

    async function clearCompleted() {
      await fetch('/pedidos/completados', { method: 'DELETE' });
    }

    function showToast(msg) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = msg;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.transition = 'opacity 0.3s';
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    function playBell() {
      try {
        const audio = document.getElementById('bellSound');
        audio.currentTime = 0;
        audio.play().catch(() => {});
      } catch {}
    }

    function toggleInvoice(id) {
      const form = document.getElementById('inv-form-' + id);
      form.style.display = form.style.display === 'flex' ? 'none' : 'flex';
    }

    async function facturarOrder(id) {
      const nit = document.getElementById('inv-nit-' + id)?.value?.trim() || '';
      const btn = document.getElementById('inv-btn-' + id);
      if (btn) { btn.textContent = '...'; btn.disabled = true; }

      try {
        const res = await fetch(`/facturar/${id}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nit }),
        });
        const data = await res.json();
        if (data.success) {
          showToast(`✅ Factura ${data.number} emitida`);
          const card = document.getElementById('order-' + id);
          if (card) card.classList.add('invoiced');
          if (btn) { btn.textContent = '✓'; btn.classList.add('done'); btn.disabled = false; }
          document.getElementById('inv-form-' + id).style.display = 'none';
        } else {
          showToast(`❌ ${data.error || 'Error al facturar'}`);
          if (btn) { btn.textContent = '🧾'; btn.disabled = false; }
        }
      } catch {
        showToast('❌ Error de conexión con Factus');
        if (btn) { btn.textContent = '🧾'; btn.disabled = false; }
      }
    }

    connect();
  </script>

</body>
</html>
