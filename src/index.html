<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coraje Fast Food</title>
  <meta name="description" content="Coraje Fast Food — Menú, domicilio y redes." />
  <meta name="theme-color" content="#FB3E2C" />

  <!-- Preconecta fonts solo si se necesitan -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #FB3E2C;
      --cream:  #F2DDCD;
    }

    html, body {
      height: 100%;
      font-family: 'Montserrat', Arial, sans-serif;
      background: var(--orange);
      overflow: hidden;
    }

    /* ── VIDEO FONDO ── */
    .video-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }
    .video-bg video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    /* capa naranja semi-transparente sobre el video */
    .video-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(251, 62, 44, 0.72);
    }

    /* ── PÁGINA ── */
    .page {
      position: relative;
      z-index: 10;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }

    /* ── CONTENEDOR CENTRADO ── */
    .card {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── LOGO ── */
    .logo-area {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2.5rem;
    }
    .logo-img {
      width: 100%;
      max-width: 92vw;
      height: auto;
      display: block;
      /* color crema aplicado directamente en el PNG */
      filter: drop-shadow(0 2px 12px rgba(0,0,0,0.15));
    }
    .logo-fallback {
      font-weight: 900;
      font-size: clamp(4.5rem, 22vw, 7rem);
      color: var(--cream);
      letter-spacing: -0.01em;
      line-height: 1;
      text-align: center;
      text-shadow: 0 2px 20px rgba(0,0,0,0.2);
    }

    /* ── BOTONES ── */
    .buttons {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
      width: 100%;
      padding: 1rem 1.4rem;
      border-radius: 999px;
      text-decoration: none;
      font-family: 'Montserrat', Arial, sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      transition: transform 0.16s ease, filter 0.16s ease, background 0.16s ease;
      cursor: pointer;
      border: none;
      will-change: transform;
    }
    .btn:hover  { transform: scale(1.025); filter: brightness(1.06); }
    .btn:active { transform: scale(0.97); }

    .btn svg { flex-shrink: 0; }

    /* MENÚ — crema sólido, estético */
    .btn-menu {
      background: var(--cream);
      color: var(--orange);
      border: none;
      box-shadow: 0 4px 24px rgba(0,0,0,0.2), 0 1px 4px rgba(0,0,0,0.1);
      font-size: 1rem;
      letter-spacing: 0.16em;
    }
    .btn-menu:hover {
      background: #f8e8d8;
      box-shadow: 0 6px 32px rgba(0,0,0,0.25);
    }

    /* DOMICILIO y redes — borde y texto crema */
    .btn-outline {
      background: rgba(242,221,205,0.07);
      color: var(--cream);
      border: 1.5px solid rgba(242,221,205,0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .btn-outline:hover {
      background: rgba(242,221,205,0.15);
      border-color: rgba(242,221,205,0.9);
    }

    /* separador visual */
    .sep {
      width: 36px;
      height: 1.5px;
      background: rgba(242,221,205,0.28);
      margin: 0.2rem auto;
      border-radius: 999px;
    }

    /* ── FOOTER ── */
    .footer {
      margin-top: 1.8rem;
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(242,221,205,0.4);
      text-align: center;
    }
  </style>
</head>

<body>

  <!-- VIDEO FONDO -->
  <div class="video-bg" aria-hidden="true">
    <video
      autoplay muted loop playsinline
      preload="metadata"
      disablepictureinpicture
      poster=""
    >
      <source src="bg.mp4" type="video/mp4" />
    </video>
  </div>

  <main class="page">
    <div class="card">

      <!-- LOGO -->
      <div class="logo-area">
        <img
          class="logo-img"
          src="logo.png"
          alt="Coraje Fast Food"
          loading="eager"
          onerror="this.style.display='none'; document.querySelector('.logo-fallback').style.display='block';"
        />
        <p class="logo-fallback" style="display:none">CORAJE</p>
      </div>

      <!-- BOTONES -->
      <div class="buttons">

        <div class="sep"></div>

        <!-- INSTAGRAM -->
        <a
          href="https://www.instagram.com/coraje.fastfood"
          target="_blank" rel="noopener"
          class="btn btn-outline"
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>

        <!-- FACEBOOK -->
        <a
          href="https://www.facebook.com/profile.php?id=61566711208504"

          <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>

        <!-- TIKTOK -->

      </div>

    </div>
  </main>

</body>
</html>
