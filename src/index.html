<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>El Restaurante</title>
  <meta name="description" content="Bienvenido a El Restaurante. Mira nuestro menú, encuéntranos en el mapa y síguenos en redes." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:    #D42B24;
      --cream:  #F5EDD8;
      --dark:   #120902;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      color: var(--cream);
      overflow: hidden;
    }

    /* ── FONDO ANIMADO ── */
    .video-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: #120902;
      overflow: hidden;
    }

    .bg-layer {
      position: absolute;
      inset: -60%;
      border-radius: 50%;
      filter: blur(80px);
      mix-blend-mode: screen;
    }
    .bg-layer-1 {
      background: radial-gradient(ellipse at 40% 50%, rgba(200, 60, 20, 0.55) 0%, transparent 65%);
      animation: drift1 9s ease-in-out infinite alternate;
    }
    .bg-layer-2 {
      background: radial-gradient(ellipse at 65% 40%, rgba(160, 40, 10, 0.45) 0%, transparent 60%);
      animation: drift2 12s ease-in-out infinite alternate;
    }
    .bg-layer-3 {
      background: radial-gradient(ellipse at 50% 75%, rgba(120, 30, 5, 0.4) 0%, transparent 55%);
      animation: drift3 7s ease-in-out infinite alternate;
    }

    @keyframes drift1 {
      from { transform: translate(0%,   0%)  scale(1);    opacity: 0.7; }
      to   { transform: translate(-6%,  4%)  scale(1.08); opacity: 1;   }
    }
    @keyframes drift2 {
      from { transform: translate(0%,   0%)  scale(1.05); opacity: 0.8; }
      to   { transform: translate(5%,  -4%)  scale(0.95); opacity: 1;   }
    }
    @keyframes drift3 {
      from { transform: translate(0%,   0%)  scale(0.95); opacity: 0.6; }
      to   { transform: translate(-3%,  5%)  scale(1.1);  opacity: 0.9; }
    }

    /* Overlay oscuro encima para contraste */
    .video-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(18, 9, 2, 0.55);
    }

    /* ── RED STRIPE ── */
    .stripe {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: var(--red);
      z-index: 99;
    }

    /* ── PAGE ── */
    .page {
      position: relative;
      z-index: 10;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1.25rem 4rem;
      gap: 0;
    }

    /* ── CARD ── */
    .card {
      width: 100%;
      max-width: 340px;
      background: rgba(18, 9, 2, 0.88);
      border: 1px solid rgba(245, 237, 216, 0.14);
      border-radius: 8px;
      padding: 2.2rem 1.6rem 1.8rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      animation: fadeUp 0.7s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── BADGE ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.38rem;
      background: var(--red);
      color: #fff;
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.25rem 0.8rem;
      border-radius: 999px;
      margin-bottom: 1.25rem;
      animation: fadeUp 0.5s 0.1s ease both;
    }
    .badge-dot {
      width: 5px; height: 5px;
      background: #fff;
      border-radius: 50%;
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    /* ── LOGO ── */
    .logo-wrap {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: 2px solid rgba(245, 237, 216, 0.3);
      padding: 3px;
      margin-bottom: 1rem;
      animation: fadeUp 0.5s 0.15s ease both;
    }
    .logo-wrap img {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }

    /* ── NOMBRE ── */
    .restaurant-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.8rem, 11vw, 4rem);
      letter-spacing: 0.06em;
      line-height: 1;
      color: var(--cream);
      text-align: center;
      animation: fadeUp 0.5s 0.2s ease both;
    }
    .restaurant-tag {
      margin-top: 0.4rem;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--cream);
      opacity: 0.45;
      text-align: center;
      animation: fadeUp 0.5s 0.25s ease both;
    }

    /* ── RULE ── */
    .rule {
      width: 28px; height: 2px;
      background: var(--red);
      margin: 1.5rem 0;
      animation: growX 0.5s 0.35s ease both;
      transform-origin: center;
    }
    @keyframes growX {
      from { opacity: 0; transform: scaleX(0); }
      to   { opacity: 1; transform: scaleX(1); }
    }

    /* ── LINKS ── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.1rem;
      border-radius: 5px;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.88rem;
      letter-spacing: 0.01em;
      transition: transform 0.2s ease, filter 0.2s ease;
      border: none;
      cursor: pointer;
      animation: fadeUp 0.45s ease both;
    }
    .btn:nth-child(1) { animation-delay: 0.4s; }
    .btn:nth-child(2) { animation-delay: 0.5s; }
    .btn:nth-child(3) { animation-delay: 0.55s; }
    .btn:nth-child(4) { animation-delay: 0.6s; }

    .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
    .btn:active { transform: translateY(0); }

    .btn-label {
      display: flex;
      align-items: center;
      gap: 0.65rem;
    }
    .btn-arrow {
      opacity: 0.5;
      transition: transform 0.2s ease, opacity 0.2s ease;
      flex-shrink: 0;
    }
    .btn:hover .btn-arrow { transform: translateX(3px); opacity: 1; }

    /* CTA principal — rojo sólido */
    .btn-primary {
      background: var(--red);
      color: #fff;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.12em;
      box-shadow: 0 4px 20px rgba(212, 43, 36, 0.5);
    }

    /* Secundarios */
    .btn-secondary {
      background: rgba(245, 237, 216, 0.09);
      color: var(--cream);
      border: 1.5px solid rgba(245, 237, 216, 0.28);
    }

    /* Separador */
    .sep {
      border: none;
      border-top: 1px solid rgba(245, 237, 216, 0.12);
      margin: 0.1rem 0;
    }

    /* ── FOOTER ── */
    .footer {
      margin-top: 1.2rem;
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--cream);
      opacity: 0.2;
      animation: fadeUp 0.4s 0.7s ease both;
    }
  </style>
</head>

<body>

  <!-- FONDO ANIMADO — reemplazar con <video> cuando el cliente provea su video -->
  <div class="video-bg" aria-hidden="true">
    <div class="bg-layer bg-layer-1"></div>
    <div class="bg-layer bg-layer-2"></div>
    <div class="bg-layer bg-layer-3"></div>
  </div>

  <div class="stripe" aria-hidden="true"></div>

  <main class="page">
    <div class="card">

      <!-- Badge + Logo + Nombre -->
      <span class="badge"><span class="badge-dot"></span> Abierto</span>

      <div class="logo-wrap">
        <img src="https://placehold.co/80x80/D42B24/F5EDD8?text=LOGO" alt="Logo del restaurante" />
      </div>

      <h1 class="restaurant-name">El Restaurante</h1>
      <p class="restaurant-tag">Ciudad &nbsp;·&nbsp; L–D &nbsp;11am – 10pm</p>

      <div class="rule"></div>

      <!-- Botones -->
      <div class="links">

        <a href="menu.html" class="btn btn-primary">

              <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
            Ver Menú
          </span>
          <svg class="btn-arrow" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
          </svg>
        </a>

        <hr class="sep" />

           target="_blank" rel="noopener" class="btn btn-secondary">

            </svg>

          </span>
          <svg class="btn-arrow" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>

        <a href="https://instagram.com/elrestaurante"
           target="_blank" rel="noopener" class="btn btn-secondary">
          <span class="btn-label">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" style="flex-shrink:0">
              <defs>
                <linearGradient id="ig" x1="0%" y1="100%" x2="100%" y2="0%">
                  <stop offset="0%"   stop-color="#f09433"/>
                  <stop offset="50%"  stop-color="#dc2743"/>

              <rect width="20" height="20" x="2" y="2" rx="5" stroke="url(#ig)" stroke-width="2"/>
              <circle cx="12" cy="12" r="3" stroke="url(#ig)" stroke-width="2"/>
              <circle cx="17.5" cy="6.5" r="1" fill="url(#ig)"/>
            </svg>
            @elrestaurante
          </span>
          <svg class="btn-arrow" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>

        <a href="https://maps.google.com/?q=El+Restaurante"
           target="_blank" rel="noopener" class="btn btn-secondary">
          <span class="btn-label">
            <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color:#FBBF24;flex-shrink:0">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            Cómo llegar
          </span>
          <svg class="btn-arrow" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
          </svg>
        </a>

      </div>
    </div>

    <p class="footer">Vorastudio</p>
  </main>

</body>
</html>
