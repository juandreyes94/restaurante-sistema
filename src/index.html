<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#FB3E2C" />
  <title>Coraje Fast Food</title>
  <meta name="description" content="Coraje Fast Food — Menú, domicilio y redes." />

  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" as="style" onload="this.rel='stylesheet'" />
  <noscript><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet" /></noscript>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #FB3E2C;
      --cream:  #F2DDCD;
    }

    /* Cubre absolutamente todo — sin ningún gap en ningún dispositivo */
    html {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--orange);
    }
    body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--orange);
      font-family: 'Montserrat', Arial, sans-serif;
    }

    /* ── VIDEO FONDO ── */
    .video-bg {
      position: fixed;
      top: -2px; left: -2px; right: -2px; bottom: -2px;
      z-index: 0;
    }
    .video-bg video {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }
    .video-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(251, 62, 44, 0.70);
    }

    /* ── PÁGINA ── */
    .page {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1.25rem;
      /* scroll interno si el contenido no cabe (pantallas muy pequeñas) */
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* ── CARD ── */
    .card {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeUp 0.55s cubic-bezier(.22,.61,.36,1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── LOGO ── */
    .logo-area {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: clamp(1.5rem, 5vw, 2.5rem);
    }
    .logo-img {
      width: 100%;
      max-width: min(92vw, 360px);
      height: auto;
      display: block;
      filter: drop-shadow(0 2px 16px rgba(0,0,0,0.18));
    }
    .logo-fallback {
      font-weight: 900;
      font-size: clamp(4rem, 20vw, 6.5rem);
      color: var(--cream);
      letter-spacing: -0.01em;
      line-height: 1;
      text-align: center;
      text-shadow: 0 2px 20px rgba(0,0,0,0.2);
    }

    /* ── BOTONES ── */
    .buttons {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: clamp(0.5rem, 1.5vw, 0.75rem);
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
      width: 100%;
      padding: clamp(0.8rem, 2.5vw, 1rem) 1.4rem;
      border-radius: 999px;
      text-decoration: none;
      font-family: 'Montserrat', Arial, sans-serif;
      font-weight: 700;
      font-size: clamp(0.82rem, 2.5vw, 0.95rem);
      letter-spacing: 0.13em;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      /* GPU layer para animaciones fluidas */
      transform: translateZ(0);
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }
    .btn:active { opacity: 0.85; transform: scale(0.97) translateZ(0); }

    .btn svg { flex-shrink: 0; }

    /* MENÚ */
    .btn-menu {
      background: var(--cream);
      color: var(--orange);
      box-shadow: 0 4px 20px rgba(0,0,0,0.22);
      letter-spacing: 0.16em;
    }

    /* Outline */
    .btn-outline {
      background: rgba(242,221,205,0.08);
      color: var(--cream);
      border: 1.5px solid rgba(242,221,205,0.45);
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
    }

    .sep {
      width: 32px;
      height: 1.5px;
      background: rgba(242,221,205,0.25);
      margin: 0.1rem auto;
      border-radius: 999px;
    }
  </style>
</head>

<body>

  <div class="video-bg" aria-hidden="true">
    <video
      autoplay muted loop playsinline
      preload="auto"
      disablepictureinpicture
      x-webkit-airplay="deny"
    >
      <source src="bg.mp4" type="video/mp4" />
    </video>
  </div>

  <main class="page">
    <div class="card">

      <div class="logo-area">
        <img
          class="logo-img"
          src="logo.png"
          alt="Coraje Fast Food"
          loading="eager"
          decoding="async"
          onerror="this.style.display='none';document.querySelector('.logo-fallback').style.display='block';"
        />
        <p class="logo-fallback" style="display:none">CORAJE</p>
      </div>

      <div class="buttons">

        <a href="menu.html" class="btn btn-menu">
          <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">

          <svg width="17" height="17" fill="currentColor" viewBox="0 0 24 24">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
          </svg>
          Domicilio

        <div class="sep"></div>

        <a href="https://www.instagram.com/coraje.fastfood" target="_blank" rel="noopener" class="btn btn-outline">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="2" width="20" height="20" rx="5"/>
            <circle cx="12" cy="12" r="4"/>
            <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>

          Instagram
        </a>

        <a href="https://www.facebook.com/profile.php?id=61566711208504" target="_blank" rel="noopener" class="btn btn-outline">
          <svg width="17" height="17" fill="currentColor" viewBox="0 0 24 24">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
          Facebook
        </a>

        <a href="https://www.tiktok.com/@coraje.fastfood" target="_blank" rel="noopener" class="btn btn-outline">
          <svg width="17" height="17" fill="currentColor" viewBox="0 0 24 24">
            <path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.31 6.31 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.17 8.17 0 004.78 1.52V6.75a4.85 4.85 0 01-1.01-.06z"/>
          </svg>
          TikTok
        </a>

      </div>
    </div>
  </main>

  <script>
    // Video loop robusto para iOS/Android
    const vid = document.querySelector('video');
    const play = () => vid.play().catch(() => {});

    vid.addEventListener('ended', () => { vid.currentTime = 0; play(); });
    vid.addEventListener('pause', () => { setTimeout(play, 200); });
    document.addEventListener('visibilitychange', () => { if (!document.hidden) play(); });
    window.addEventListener('pageshow', play);

    // Intentar reproducir inmediatamente
    play();
  </script>
</body>
</html>
