<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generar QR — Mesas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red:   #D42B24;
      --cream: #F5EDD8;
      --dark:  #120902;
      --card:  #1e1008;
      --border: rgba(245,237,216,0.12);
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      color: var(--cream);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    header {
      text-align: center; margin-bottom: 2rem;
    }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; letter-spacing: 0.06em; }
    .subtitle { color: rgba(245,237,216,0.5); font-size: 0.88rem; margin-top: 0.3rem; }

    /* Config panel */
    .config-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      max-width: 480px;
      margin: 0 auto 2rem;
    }
    .config-panel h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 0.05em; margin-bottom: 1rem; }

    .form-row { display: flex; gap: 0.75rem; margin-bottom: 0.75rem; align-items: flex-end; }
    .field { flex: 1; }
    .field label { display: block; font-size: 0.75rem; color: rgba(245,237,216,0.5); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.35rem; }
    .field input {
      width: 100%;
      background: rgba(245,237,216,0.06);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--cream);
      font-family: 'DM Sans', sans-serif; font-size: 0.88rem;
      padding: 0.55rem 0.75rem;
      transition: border-color 0.2s;
    }
    .field input:focus { outline: none; border-color: var(--red); }

    .gen-btn {
      background: var(--red); color: #fff; border: none;
      border-radius: 7px; padding: 0.6rem 1.25rem;
      font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 0.08em;
      cursor: pointer; transition: filter 0.2s; white-space: nowrap;
    }
    .gen-btn:hover { filter: brightness(1.1); }

    .print-btn {
      display: block; margin: 0 auto 2rem;
      background: transparent; color: var(--cream);
      border: 1px solid var(--border); border-radius: 7px;
      padding: 0.6rem 1.5rem; font-size: 0.88rem; font-weight: 500;
      cursor: pointer; transition: border-color 0.2s;
    }
    .print-btn:hover { border-color: var(--cream); }

    /* QR grid */
    .qr-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.25rem;
      max-width: 900px;
      margin: 0 auto;
    }

    /* QR card */
    .qr-card {
      background: #fff;
      border-radius: 12px;
      padding: 1.25rem 1rem 1rem;
      display: flex; flex-direction: column; align-items: center; gap: 0.75rem;
      break-inside: avoid;
    }
    .qr-mesa {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem; letter-spacing: 0.06em;
      color: #120902;
    }
    .qr-canvas { display: block; }
    .qr-url {
      font-size: 0.62rem; color: #888;
      word-break: break-all; text-align: center;
      max-width: 160px;
    }
    .qr-brand {
      font-size: 0.65rem; color: #aaa;
      letter-spacing: 0.1em; text-transform: uppercase;
    }

    /* Print styles */
    @media print {
      body { background: #fff; padding: 0; }
      header, .config-panel, .print-btn { display: none !important; }
      .qr-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
      .qr-card { border: 1px solid #ddd; page-break-inside: avoid; }
    }
  </style>
</head>

<body>

  <header>
    <h1>🔲 Generador de QR</h1>
    <p class="subtitle">Un QR por mesa — los clientes escanean y hacen su pedido</p>
  </header>

  <div class="config-panel">
    <h2>Configuración</h2>
    <div class="form-row">
      <div class="field">
        <label>IP o dominio del servidor</label>
        <input type="text" id="serverIp" placeholder="192.168.1.100" />
      </div>
      <div class="field" style="max-width:80px">
        <label>Puerto</label>
        <input type="number" id="serverPort" value="3000" />
      </div>
    </div>
    <div class="form-row">
      <div class="field" style="max-width:100px">
        <label>Mesas (desde)</label>
        <input type="number" id="mesaDesde" value="1" min="1" max="100" />
      </div>
      <div class="field" style="max-width:100px">
        <label>Hasta</label>
        <input type="number" id="mesaHasta" value="10" min="1" max="100" />
      </div>
      <div class="field" style="max-width:120px">
        <label>Nombre local</label>
        <input type="text" id="restaurantName" value="El Restaurante" />
      </div>
    </div>
    <button class="gen-btn" onclick="generateQRs()">Generar QR Codes</button>
  </div>

  <button class="print-btn" id="printBtn" style="display:none" onclick="window.print()">🖨️ Imprimir todos los QR</button>

  <div class="qr-grid" id="qrGrid"></div>

  <script>
    // Detectar IP actual del servidor automáticamente
    document.getElementById('serverIp').value = location.hostname;
    document.getElementById('serverPort').value = location.port || '3000';

    async function generateQRs() {
      const ip     = document.getElementById('serverIp').value.trim();
      const port   = document.getElementById('serverPort').value.trim();
      const desde  = parseInt(document.getElementById('mesaDesde').value);
      const hasta  = parseInt(document.getElementById('mesaHasta').value);
      const nombre = document.getElementById('restaurantName').value.trim() || 'El Restaurante';

      if (!ip || isNaN(desde) || isNaN(hasta) || desde > hasta) {
        alert('Verifica los datos ingresados');
        return;
      }

      const grid = document.getElementById('qrGrid');
      grid.innerHTML = '';

      for (let mesa = desde; mesa <= hasta; mesa++) {
        const url = `http://${ip}:${port}/menu.html?mesa=${mesa}`;

        // Construir card sin innerHTML para mantener referencias DOM
        const card = document.createElement('div');
        card.className = 'qr-card';

        const nameEl = document.createElement('div');
        nameEl.className = 'qr-mesa';
        nameEl.textContent = nombre;

        const qrDiv = document.createElement('div');

        const mesaEl = document.createElement('div');
        mesaEl.className = 'qr-mesa';
        mesaEl.style.cssText = 'font-size:1.8rem;color:#D42B24';
        mesaEl.textContent = `MESA ${mesa}`;

        const urlEl = document.createElement('div');
        urlEl.className = 'qr-url';
        urlEl.textContent = url;

        const brandEl = document.createElement('div');
        brandEl.className = 'qr-brand';
        brandEl.textContent = 'Escanea para ordenar';

        card.append(nameEl, qrDiv, mesaEl, urlEl, brandEl);
        grid.appendChild(card);

        new QRCode(qrDiv, {
          text: url,
          width: 160,
          height: 160,
          colorDark: '#120902',
          colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel.M,
        });
      }

      document.getElementById('printBtn').style.display = 'block';
    }

    // Generar automáticamente al cargar con los valores default
    window.addEventListener('load', generateQRs);
  </script>

</body>
</html>
